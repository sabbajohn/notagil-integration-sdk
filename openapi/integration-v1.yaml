openapi: 3.1.0
info:
  title: NotaAgil Integration API
  version: 1.1.0-beta
  summary: Public API-first surface for fiscal documents, company data, catalogs and webhooks.
  description: |
    Public contract for API clients. Every path in this document is relative to
    `/api/v1/integrations` and requires a NotaAgil integration bearer token unless
    explicitly stated otherwise.
servers:
  - url: https://api.notagil.com.br/api/v1/integrations
    description: Production
  - url: https://sandbox.notagil.com.br/api/v1/integrations
    description: Sandbox
security:
  - bearerAuth: []
tags:
  - name: Companies
  - name: Documents
  - name: Configuration
  - name: Fiscal Operations
  - name: Fiscal Rates
  - name: Fiscal Rules
  - name: Fiscal Catalog
  - name: Products
  - name: Takers
  - name: Webhooks
  - name: Metrics
  - name: Billing
  - name: Stock
  - name: Schedules
paths:
  /companies:
    get:
      tags: [Companies]
      operationId: listCompanies
      x-required-scopes: ["companies:read"]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
  /companies/{company_id}:
    get:
      tags: [Companies]
      operationId: getCompany
      x-required-scopes: ["companies:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/configuration:
    get:
      tags: [Configuration]
      operationId: getCompanyConfiguration
      x-required-scopes: ["configuration:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    put:
      tags: [Configuration]
      operationId: updateCompanyConfiguration
      x-required-scopes: ["configuration:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/nfse/provider-info:
    get:
      tags: [Configuration]
      operationId: getCompanyNfseProviderInfo
      description: Returns the dynamic NFSe form policy required by the resolved municipal provider.
      x-required-scopes: ["configuration:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/MunicipioQuery"
        - $ref: "#/components/parameters/FiscalEnvironmentQuery"
      responses:
        "200":
          description: NFSe provider metadata and form policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NfseProviderInfo" }
  /companies/{company_id}/fiscal/operation-profiles:
    get:
      tags: [Fiscal Operations]
      operationId: listCompanyFiscalOperationProfiles
      x-required-scopes: ["fiscal:operations:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Operations]
      operationId: createCompanyFiscalOperationProfile
      x-required-scopes: ["fiscal:operations:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/fiscal/operation-profiles/{profile_id}:
    put:
      tags: [Fiscal Operations]
      operationId: updateCompanyFiscalOperationProfile
      x-required-scopes: ["fiscal:operations:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Operations]
      operationId: deleteCompanyFiscalOperationProfile
      x-required-scopes: ["fiscal:operations:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/fiscal/rate-references:
    get:
      tags: [Fiscal Rates]
      operationId: listCompanyFiscalRateReferences
      x-required-scopes: ["fiscal:rates:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Rates]
      operationId: createCompanyFiscalRateReference
      x-required-scopes: ["fiscal:rates:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/fiscal/rate-references/{rate_reference_id}:
    put:
      tags: [Fiscal Rates]
      operationId: updateCompanyFiscalRateReference
      x-required-scopes: ["fiscal:rates:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: rate_reference_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Rates]
      operationId: deleteCompanyFiscalRateReference
      x-required-scopes: ["fiscal:rates:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: rate_reference_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/fiscal/tax-rule-sets:
    get:
      tags: [Fiscal Rules]
      operationId: listCompanyFiscalTaxRuleSets
      x-required-scopes: ["fiscal:rules:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Rules]
      operationId: createCompanyFiscalTaxRuleSet
      x-required-scopes: ["fiscal:rules:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/fiscal/tax-rule-sets/{tax_rule_set_id}:
    put:
      tags: [Fiscal Rules]
      operationId: updateCompanyFiscalTaxRuleSet
      x-required-scopes: ["fiscal:rules:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: tax_rule_set_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Rules]
      operationId: deleteCompanyFiscalTaxRuleSet
      x-required-scopes: ["fiscal:rules:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: tax_rule_set_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/documents/preview:
    post:
      tags: [Documents]
      operationId: previewCompanyDocument
      x-required-scopes: ["documents:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/DocumentPreview" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/documents/{operation_code}/preview:
    post:
      tags: [Documents]
      operationId: previewCompanyDocumentByOperation
      description: Resolves the fiscal operation by code and previews a document from a snapshot-shaped input contract.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/OperationCode"
      requestBody: { $ref: "#/components/requestBodies/OperationDocumentPreview" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/documents:
    get:
      tags: [Documents]
      operationId: listCompanyDocuments
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/DocumentTypeQuery"
      responses:
        "200": { $ref: "#/components/responses/PaginatedCollection" }
    post:
      tags: [Documents]
      operationId: createCompanyDocument
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { $ref: "#/components/requestBodies/DocumentSubmit" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/documents/{operation_code}:
    post:
      tags: [Documents]
      operationId: createCompanyDocumentByOperation
      description: Resolves the fiscal operation by code and queues a document from a snapshot-shaped input contract.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/OperationCode"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { $ref: "#/components/requestBodies/OperationDocumentSubmit" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/documents/{external_id}:
    get:
      tags: [Documents]
      operationId: getCompanyDocument
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/documents/{external_id}/cancel:
    post:
      tags: [Documents]
      operationId: cancelCompanyDocument
      x-required-scopes: ["documents:cancel"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/documents/{external_id}/correct:
    post:
      tags: [Documents]
      operationId: correctCompanyDocument
      x-required-scopes: ["documents:correct"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/direct/documents:
    post:
      tags: [Documents]
      operationId: createCompanyDirectDocument
      x-required-scopes: ["documents:direct"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { $ref: "#/components/requestBodies/DocumentSubmit" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/direct/documents/xml:
    post:
      tags: [Documents]
      operationId: transmitCompanyDirectXml
      x-required-scopes: ["documents:direct"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/products:
    get:
      tags: [Products]
      operationId: listProducts
      x-required-scopes: ["products:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Products]
      operationId: createProduct
      x-required-scopes: ["products:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/products/{product_id}:
    get:
      tags: [Products]
      operationId: getProduct
      x-required-scopes: ["products:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: product_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    put:
      tags: [Products]
      operationId: updateProduct
      x-required-scopes: ["products:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: product_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Products]
      operationId: deleteProduct
      x-required-scopes: ["products:delete"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: product_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /companies/{company_id}/takers:
    get:
      tags: [Takers]
      operationId: listTakers
      x-required-scopes: ["takers:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Takers]
      operationId: createTaker
      x-required-scopes: ["takers:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /webhooks:
    get:
      tags: [Webhooks]
      operationId: listWebhooks
      x-required-scopes: ["webhooks:read"]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Webhooks]
      operationId: createWebhook
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /webhooks/{webhook_id}:
    put:
      tags: [Webhooks]
      operationId: updateWebhook
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /webhooks/{webhook_id}/rotate-secret:
    post:
      tags: [Webhooks]
      operationId: rotateWebhookSecret
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /webhooks/{webhook_id}/test:
    post:
      tags: [Webhooks]
      operationId: testWebhook
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /webhooks/{webhook_id}/deliveries:
    get:
      tags: [Webhooks]
      operationId: listWebhookDeliveries
      x-required-scopes: ["webhooks:read"]
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Collection" }
  /metrics:
    get:
      tags: [Metrics]
      operationId: getIntegrationMetrics
      x-required-scopes: ["metrics:read"]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /billing:
    get:
      tags: [Billing]
      operationId: getIntegrationBilling
      x-required-scopes: ["billing:read"]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /documents:
    get:
      tags: [Documents]
      operationId: listDefaultCompanyDocuments
      deprecated: false
      description: Compatibility alias for the integration client's default company.
      x-required-scopes: ["documents:read"]
      responses:
        "200": { $ref: "#/components/responses/PaginatedCollection" }
    post:
      tags: [Documents]
      operationId: createDefaultCompanyDocument
      description: Compatibility alias for the integration client's default company.
      x-required-scopes: ["documents:write"]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { $ref: "#/components/requestBodies/DocumentSubmit" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /documents/preview:
    post:
      tags: [Documents]
      operationId: previewDefaultCompanyDocument
      description: Compatibility alias for the integration client's default company.
      x-required-scopes: ["documents:write"]
      requestBody: { $ref: "#/components/requestBodies/DocumentPreview" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /documents/{operation_code}/preview:
    post:
      tags: [Documents]
      operationId: previewDefaultCompanyDocumentByOperation
      description: Compatibility alias for the default company. Resolves the fiscal operation by code and previews from snapshot-shaped input.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/OperationCode"
      requestBody: { $ref: "#/components/requestBodies/OperationDocumentPreview" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /documents/{operation_code}:
    post:
      tags: [Documents]
      operationId: createDefaultCompanyDocumentByOperation
      description: Compatibility alias for the default company. Resolves the fiscal operation by code and queues from snapshot-shaped input.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/OperationCode"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { $ref: "#/components/requestBodies/OperationDocumentSubmit" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /documents/{external_id}:
    get:
      tags: [Documents]
      operationId: getDefaultCompanyDocument
      x-required-scopes: ["documents:read"]
      parameters: [{ $ref: "#/components/parameters/ExternalId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /direct/documents:
    post:
      tags: [Documents]
      operationId: createDefaultCompanyDirectDocument
      description: Compatibility alias for direct transmission on the integration client's default company.
      x-required-scopes: ["documents:direct"]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { $ref: "#/components/requestBodies/DocumentSubmit" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /direct/documents/xml:
    post:
      tags: [Documents]
      operationId: transmitDefaultCompanyDirectXml
      description: Compatibility alias for direct XML transmission on the integration client's default company.
      x-required-scopes: ["documents:direct"]
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "202": { $ref: "#/components/responses/Resource" }
  /configuration/company:
    get:
      tags: [Configuration]
      operationId: getDefaultCompanyConfiguration
      x-required-scopes: ["configuration:read"]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    put:
      tags: [Configuration]
      operationId: updateDefaultCompanyConfiguration
      x-required-scopes: ["configuration:write"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /nfse/provider-info:
    get:
      tags: [Configuration]
      operationId: getDefaultCompanyNfseProviderInfo
      description: Compatibility alias for the integration client's default company.
      x-required-scopes: ["configuration:read"]
      parameters:
        - $ref: "#/components/parameters/MunicipioQuery"
        - $ref: "#/components/parameters/FiscalEnvironmentQuery"
      responses:
        "200":
          description: NFSe provider metadata and form policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NfseProviderInfo" }
  /documents/{external_id}/xml:
    get:
      tags: [Documents]
      operationId: downloadDefaultCompanyDocumentXml
      x-required-scopes: ["documents:read"]
      parameters: [{ $ref: "#/components/parameters/ExternalId" }]
      responses:
        "200": { description: XML artifact. }
  /documents/{external_id}/pdf:
    get:
      tags: [Documents]
      operationId: downloadDefaultCompanyDocumentPdf
      x-required-scopes: ["documents:read"]
      parameters: [{ $ref: "#/components/parameters/ExternalId" }]
      responses:
        "200": { description: PDF artifact. }
  /documents/{external_id}/snapshot:
    get:
      tags: [Documents]
      operationId: getDefaultCompanyDocumentSnapshot
      x-required-scopes: ["documents:read"]
      parameters: [{ $ref: "#/components/parameters/ExternalId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /documents/{external_id}/query:
    post:
      tags: [Documents]
      operationId: queryDefaultCompanyDocument
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
        - name: force_remote
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /certificates:
    get:
      tags: [Configuration]
      operationId: listDefaultCompanyCertificates
      x-required-scopes: ["certificates:read"]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Configuration]
      operationId: createDefaultCompanyCertificate
      x-required-scopes: ["certificates:write"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /certificates/{certificate_id}:
    patch:
      tags: [Configuration]
      operationId: updateDefaultCompanyCertificate
      x-required-scopes: ["certificates:write"]
      parameters:
        - name: certificate_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /certificates/{certificate_id}/validate:
    post:
      tags: [Configuration]
      operationId: validateDefaultCompanyCertificate
      x-required-scopes: ["certificates:write"]
      parameters:
        - name: certificate_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /readiness:
    get:
      tags: [Configuration]
      operationId: getDefaultCompanyReadiness
      x-required-scopes: ["onboarding:read", "configuration:read"]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /onboarding/imports:
    get:
      tags: [Configuration]
      operationId: listDefaultCompanyOnboardingImports
      x-required-scopes: ["onboarding:read"]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Configuration]
      operationId: createDefaultCompanyOnboardingImport
      x-required-scopes: ["onboarding:write"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /onboarding/imports/{import_id}:
    get:
      tags: [Configuration]
      operationId: getDefaultCompanyOnboardingImport
      x-required-scopes: ["onboarding:read"]
      parameters:
        - name: import_id
          in: path
          required: true
