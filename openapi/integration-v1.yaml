components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    CompanyId:
      name: company_id
      in: path
      required: true
      schema: { type: string }
    ExternalId:
      name: external_id
      in: path
      required: true
      schema: { type: string }
    OperationCode:
      name: operation_code
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Idempotency key required by queued create and direct transmission endpoints.
      schema: { type: string }
    DocumentTypeQuery:
      name: document_type
      in: query
      required: false
      schema:
        type: string
        enum: [nfe, nfce, nfse]
    MunicipioQuery:
      name: municipio
      in: query
      required: false
      schema: { type: string }
    FiscalEnvironmentQuery:
      name: fiscal_environment
      in: query
      required: false
      schema:
        type: string
        enum: [homologacao, producao, production, prod]
    CnpjQuery:
      name: cnpj
      in: query
      required: false
      schema: { type: string, maxLength: 20 }
