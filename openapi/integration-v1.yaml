components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    CompanyId:
      name: company_id
      in: path
      required: true
      schema: { type: string }
    ExternalId:
      name: external_id
      in: path
      required: true
      schema: { type: string }
    OperationCode:
      name: operation_code
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string }
    DocumentTypeQuery:
      name: document_type
      in: query
      required: false
      schema:
        type: string
        enum: [nfe, nfce, nfse]
    MunicipioQuery:
      name: municipio
      in: query
      required: false
      schema: { type: string }
    FiscalEnvironmentQuery:
      name: fiscal_environment
      in: query
      required: false
      schema:
        type: string
        enum: [homologacao, producao, production, prod]
  requestBodies:
    JsonObject:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    DocumentPreview:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentRequest"
    DocumentSubmit:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/DocumentRequest"
              - type: object
                required: [external_id]
                properties:
                  external_id: { type: string }
    OperationDocumentPreview:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OperationDocumentRequest"
    OperationDocumentSubmit:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/OperationDocumentRequest"
              - type: object
                required: [external_id]
                properties:
                  external_id: { type: string }
  responses:
    Resource:
      description: JSON resource response.
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { type: object, additionalProperties: true }
    Collection:
      description: JSON collection response.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items: { type: object, additionalProperties: true }
    PaginatedCollection:
      description: Paginated JSON collection response.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items: { type: object, additionalProperties: true }
              meta:
                type: object
                additionalProperties: true
  schemas:
    DocumentRequest:
      type: object
      required: [document_type, payload]
      properties:
        external_id: { type: string }
        document_type:
          type: string
          enum: [nfe, nfce, nfse]
        municipio: { type: string }
        payload:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    OperationDocumentRequest:
      type: object
      required: [document_type, snapshot]
      properties:
        external_id: { type: string }
        document_type:
          type: string
          enum: [nfe, nfce, nfse]
        municipio: { type: string }
        snapshot:
          $ref: "#/components/schemas/OperationDocumentSnapshot"
        metadata:
          type: object
          additionalProperties: true
    OperationDocumentSnapshot:
      type: object
      required: [items]
      description: Snapshot-shaped input. Fiscal resolution fields are generated by NotaAgil and must not be sent by clients.
      properties:
        document_direction: { type: string }
        direction: { type: string }
        fiscal_environment:
          type: string
          enum: [homologacao, producao]
        reference_date: { type: string }
        document_data:
          type: object
          additionalProperties: true
        counterparty:
          type: object
          additionalProperties: true
        document_references:
          type: array
          items:
            type: object
            additionalProperties: true
        items:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    NfseProviderInfo:
      type: object
      properties:
        provider_key: { type: [string, "null"] }
        municipio: { type: [string, "null"] }
        resolution_source: { type: [string, "null"] }
        provider_metadata:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
        form_policy:
          $ref: "#/components/schemas/NfseFormPolicy"
    NfseFormPolicy:
      type: object
      properties:
        provider_key: { type: [string, "null"] }
        layout_family: { type: [string, "null"] }
        municipio_ibge: { type: [string, "null"] }
        municipio_nome: { type: [string, "null"] }
        policy_source: { type: string }
        required_fields:
          type: array
          items: { $ref: "#/components/schemas/NfsePolicyField" }
        visible_fields:
          type: array
          items: { $ref: "#/components/schemas/NfsePolicyField" }
        default_values:
          type: object
          additionalProperties: { type: string }
        field_schema:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
        labels:
          type: object
          additionalProperties: { type: string }
        hints:
          type: object
          additionalProperties: { type: string }
    NfsePolicyField:
      type: string
      enum:
        - service.municipal_code
        - service.national_tax_code
        - service.nbs
        - service.cnae_code
        - service.activity_code
        - prestador.op_simp_nac
