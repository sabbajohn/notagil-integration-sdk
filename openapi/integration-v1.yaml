  schemas:
    DocumentRequest:
      type: object
      required: [document_type, payload]
      properties:
        external_id: { type: string }
        document_type:
          type: string
          enum: [nfe, nfce, nfse]
        municipio: { type: string }
        payload:
          type: object
          additionalProperties: true
          description: Generic direct payload contract. Payloads are normalized before transmission and legacy aliases may be adapted temporarily with internal compatibility warnings. For `document_type=nfse`, prefer the canonical NFSe payload shape and use `provider-info` to discover required canonical fields for the resolved provider. For `nfse_nacional`/`manaus`, prefer only the canonical PT-BR root fields `id`, `tpAmb`, `dhEmi`, `verAplic`, `serie`, `nDPS`, `dCompet`, `tpEmit`, `cLocEmi`, `prestador`, `tomador`, `servico` and `valor_servicos`.
        metadata:
          type: object
          additionalProperties: true
          description: Optional integration metadata. Compatibility warnings and legacy field usage are audited internally by NotaAgil and are not yet part of the public response envelope.
    OperationDocumentRequest:
      type: object
      required: [document_type, snapshot]
      properties:
        external_id: { type: string }
        document_type:
          type: string
          enum: [nfe, nfce, nfse]
        municipio: { type: string }
        snapshot:
          $ref: "#/components/schemas/OperationDocumentSnapshot"
        metadata:
          type: object
          additionalProperties: true
    OperationDocumentSnapshot:
      type: object
      required: [items]
      description: Snapshot-shaped input. Fiscal resolution fields are generated by NotaAgil and must not be sent by clients. Use `counterparty` for the recipient/taker/consumer, `document_data` for document fields and canonical item fields such as `quantity`, `unit_price`, `gross_amount`, `description` and `sku`. Operation-code routes normalize only the supported snapshot contract; legacy `customer`, `complementary`, `totals`, `tax_totals` and Portuguese item aliases are rejected.
      properties:
        document_direction: { type: string }
        direction: { type: string }
        fiscal_environment:
          type: string
          enum: [homologacao, producao]
        reference_date: { type: string }
        document_data:
          type: object
          additionalProperties: true
        counterparty:
          type: object
          additionalProperties: true
        document_references:
          type: array
          items:
            type: object
            additionalProperties: true
        items:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    NfseProviderInfo:
      type: object
      properties:
        provider_key: { type: [string, "null"] }
        municipio: { type: [string, "null"] }
        resolution_source: { type: [string, "null"] }
        provider_metadata:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
        form_policy:
          $ref: "#/components/schemas/NfseFormPolicy"
    NfseFormPolicy:
      type: object
      properties:
        provider_key: { type: [string, "null"] }
        layout_family: { type: [string, "null"] }
        municipio_ibge: { type: [string, "null"] }
        municipio_nome: { type: [string, "null"] }
        policy_source: { type: string }
        required_fields:
          type: array
          items: { $ref: "#/components/schemas/NfsePolicyField" }
        visible_fields:
          type: array
          items: { $ref: "#/components/schemas/NfsePolicyField" }
        default_values:
          type: object
          additionalProperties: { type: string }
        field_schema:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
        labels:
          type: object
          additionalProperties: { type: string }
        hints:
          type: object
          additionalProperties: { type: string }
        enum_fields:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        conditional_rules:
          type: array
          items:
            type: object
            additionalProperties: true
        extensions_supported:
          type: array
          items: { type: string }
    NfsePolicyField:
      type: string
      enum:
        - servico.cTribMun
        - servico.cTribNac
        - servico.cNBS
        - servico.codigoCnae
        - servico.codigo_atividade
        - servico.benefit_code
        - prestador.opSimpNac
        - prestador.mei
    ResourceResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
    CollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
    PaginatedCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        code: { type: string }
        details:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        errors:
          type: object
          additionalProperties: true
        data:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        ok:
          type: boolean
        error:
          oneOf:
            - type: string
            - type: "null"
        error_code:
          type: string
    DeleteResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            deleted:
              type: boolean
              const: true
    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        last_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
    ResponseContractMeta:
      type: object
      description: Documents the canonical response contract and the legacy aliases that remain available temporarily for backward compatibility.
      properties:
        version: { type: string, example: "v1" }
        canonical_fields:
          type: array
          items: { type: string }
          example: [status, document_type, operational_status, fiscal_status, access_key, protocol, authorized_at]
        legacy_aliases:
          type: array
          items: { type: string }
          example: [status_operacional, status_fiscal, chave_acesso, protocolo, autorizado_em, serie, numero]
        deprecated_top_level_aliases:
          type: array
          items: { type: string }
          description: Legacy aliases that still exist at the response top level temporarily, but should be replaced by canonical fields or the dedicated legacy_aliases block.
          example: [legacy_status, type, status_operacional, status_fiscal, chave_acesso, protocolo, autorizado_em, serie, numero]
        compatibility_block:
          type: string
          description: Response property that groups compatibility aliases explicitly.
          example: legacy_aliases
    IntegrationResponseMeta:
      type: object
      properties:
        response_contract:
          $ref: "#/components/schemas/ResponseContractMeta"
