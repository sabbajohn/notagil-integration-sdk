openapi: 3.1.0
info:
  title: NotaAgil Integration API
  version: 1.1.0-beta
  summary: Public API-first surface for fiscal documents, company data, catalogs and webhooks.
  description: |
    Public contract for API clients. Every path in this document is relative to
    `/api/v1/integrations` and requires a NotaAgil integration bearer token unless
    explicitly stated otherwise.
  contact:
    name: Sabba John - Sabba Sistemas
  x-author: Sabba John - Sabba Sistemas
servers:
  - url: https://api_notagil.sabbasistemas.com.br/api/v1/integrations
    description: Production
  - url: http://localhost:8001/api/v1/integrations
    description: Sandbox
security:
  - bearerAuth: []
tags:
  - name: Company
  - name: Documents
  - name: Configuration
  - name: Fiscal Operations
  - name: Fiscal Rates
  - name: Fiscal Rules
  - name: Fiscal Catalog
  - name: Products
  - name: Takers
  - name: Webhooks
  - name: Metrics
  - name: Billing
  - name: Stock
  - name: Schedules
paths:
  /company:
    get:
      tags: [Company]
      operationId: listCompanies
      x-required-scopes: ["company:read"]
      responses:
        "200": { $ref: "#/components/responses/CompanyCollectionResponse" }
  # Depreciar ja que cada token a uma empresa especifica
  /company/{company_id}:
    get:
      tags: [Company]
      operationId: getCompany
      x-required-scopes: ["company:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/CompanyResponse" }
  /company/{company_id}/configuration:
    get:
      tags: [Configuration]
      operationId: getCompanyConfiguration
      x-required-scopes: ["configuration:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/CompanyResponse" }
    put:
      tags: [Configuration]
      operationId: updateCompanyConfiguration
      description: Updates company configuration fields for the selected company.
      x-required-scopes: ["configuration:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/CompanyResponse" }
  /company/{company_id}/nfse/provider-info:
    get:
      tags: [Configuration]
      operationId: getCompanyNfseProviderInfo
      description: Returns the dynamic NFSe form policy required by the resolved provider. The exposed `required_fields`, `visible_fields` and `payload_paths` reference only canonical public NFSe fields, never internal provider layouts. For `nfse_nacional`/`manaus`, direct NFSe payloads must use the canonical PT-BR root contract.
      x-required-scopes: ["configuration:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/MunicipioQuery"
        - $ref: "#/components/parameters/FiscalEnvironmentQuery"
      responses:
        "200": { $ref: "#/components/responses/NfseProviderInfoResponse" }
  /company/{company_id}/certificates:
    get:
      tags: [Configuration]
      operationId: listCompanyCertificates
      x-required-scopes: ["certificates:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/CertificateCollectionResponse" }
    post:
      tags: [Configuration]
      operationId: createCompanyCertificate
      description: Creates and stores a new certificate for the selected company.
      x-required-scopes: ["certificates:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/CertificateResponse" }
  /company/{company_id}/certificates/{certificate_id}:
    patch:
      tags: [Configuration]
      operationId: updateCompanyCertificate
      description: Updates mutable certificate attributes such as its lifecycle status.
      x-required-scopes: ["certificates:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: certificate_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/CertificateResponse" }
  /company/{company_id}/certificates/{certificate_id}/validate:
    post:
      tags: [Configuration]
      operationId: validateCompanyCertificate
      description: Validates the stored certificate contents without changing the stored certificate record.
      x-required-scopes: ["certificates:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: certificate_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/CertificateValidationResponse" }
  /company/{company_id}/readiness:
    get:
      tags: [Configuration]
      operationId: getCompanyReadiness
      x-required-scopes: ["onboarding:read", "configuration:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/onboarding/imports:
    get:
      tags: [Configuration]
      operationId: listCompanyOnboardingImports
      x-required-scopes: ["onboarding:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Configuration]
      operationId: createCompanyOnboardingImport
      description: Creates a new onboarding import payload for later review and promotion.
      x-required-scopes: ["onboarding:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/onboarding/imports/{import_id}:
    get:
      tags: [Configuration]
      operationId: getCompanyOnboardingImport
      x-required-scopes: ["onboarding:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: import_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/onboarding/imports/{import_id}/review:
    post:
      tags: [Configuration]
      operationId: reviewCompanyOnboardingImport
      description: Reviews the staged onboarding import and records the review outcome.
      x-required-scopes: ["onboarding:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: import_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/onboarding/imports/{import_id}/promote:
    post:
      tags: [Configuration]
      operationId: promoteCompanyOnboardingImport
      description: Promotes the reviewed onboarding import into company master data.
      x-required-scopes: ["onboarding:promote"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: import_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/options:
    get:
      tags: [Fiscal Catalog]
      operationId: listCompanyFiscalOptions
      x-required-scopes: ["fiscal_catalog:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/cfops:
    get:
      tags: [Fiscal Catalog]
      operationId: listCompanyCfops
      x-required-scopes: ["fiscal_catalog:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
  /company/{company_id}/fiscal/utils/municipalities:
    get:
      tags: [Fiscal Catalog]
      operationId: searchCompanyMunicipalities
      x-required-scopes: ["fiscal_catalog:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/utils/ncms:
    get:
      tags: [Fiscal Catalog]
      operationId: searchCompanyNcms
      x-required-scopes: ["fiscal_catalog:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/tax-catalogs:
    get:
      tags: [Fiscal Catalog]
      operationId: listCompanyTaxCatalogs
      x-required-scopes: ["fiscal_catalog:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
  /company/{company_id}/fiscal/tax-catalogs/{catalog}/situations:
    get:
      tags: [Fiscal Catalog]
      operationId: listCompanyTaxSituations
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: catalog
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Collection" }
  /company/{company_id}/fiscal/tax-situations/{situation}/classifications:
    get:
      tags: [Fiscal Catalog]
      operationId: listCompanyTaxClassifications
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: situation
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Collection" }
  /company/{company_id}/fiscal/tax-situations/{situation}/consequence-template:
    get:
      tags: [Fiscal Catalog]
      operationId: getCompanyTaxConsequenceTemplate
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: situation
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/emitter-profiles:
    get:
      tags: [Fiscal Operations]
      operationId: listCompanyFiscalEmitterProfiles
      x-required-scopes: ["fiscal:profiles:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Operations]
      operationId: createCompanyFiscalEmitterProfile
      description: Creates a fiscal emitter profile for the selected company.
      x-required-scopes: ["fiscal:profiles:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/emitter-profiles/{profile_id}:
    put:
      tags: [Fiscal Operations]
      operationId: updateCompanyFiscalEmitterProfile
      description: Updates the selected fiscal emitter profile.
      x-required-scopes: ["fiscal:profiles:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Operations]
      operationId: deleteCompanyFiscalEmitterProfile
      description: Deletes the selected fiscal emitter profile.
      x-required-scopes: ["fiscal:profiles:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/operation-profiles:
    get:
      tags: [Fiscal Operations]
      operationId: listCompanyFiscalOperationProfiles
      x-required-scopes: ["fiscal:operations:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Operations]
      operationId: createCompanyFiscalOperationProfile
      description: Creates a fiscal operation profile for the selected company.
      x-required-scopes: ["fiscal:operations:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/operation-profiles/{profile_id}:
    put:
      tags: [Fiscal Operations]
      operationId: updateCompanyFiscalOperationProfile
      description: Updates the selected fiscal operation profile.
      x-required-scopes: ["fiscal:operations:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Operations]
      operationId: deleteCompanyFiscalOperationProfile
      description: Deletes the selected fiscal operation profile.
      x-required-scopes: ["fiscal:operations:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: profile_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/profile-assignments:
    get:
      tags: [Fiscal Operations]
      operationId: listCompanyFiscalProfileAssignments
      x-required-scopes: ["fiscal:profiles:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Operations]
      operationId: createCompanyFiscalProfileAssignment
      description: Creates a fiscal profile assignment for the selected company.
      x-required-scopes: ["fiscal:profiles:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/profile-assignments/{assignment_id}:
    put:
      tags: [Fiscal Operations]
      operationId: updateCompanyFiscalProfileAssignment
      description: Updates the selected fiscal profile assignment.
      x-required-scopes: ["fiscal:profiles:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: assignment_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Operations]
      operationId: deleteCompanyFiscalProfileAssignment
      description: Deletes the selected fiscal profile assignment.
      x-required-scopes: ["fiscal:profiles:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: assignment_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/rate-references:
    get:
      tags: [Fiscal Rates]
      operationId: listCompanyFiscalRateReferences
      x-required-scopes: ["fiscal:rates:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Rates]
      operationId: createCompanyFiscalRateReference
      description: Creates a company-scoped fiscal rate reference override.
      x-required-scopes: ["fiscal:rates:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/rate-references/{rate_reference_id}:
    put:
      tags: [Fiscal Rates]
      operationId: updateCompanyFiscalRateReference
      description: Updates the selected company-scoped fiscal rate reference.
      x-required-scopes: ["fiscal:rates:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: rate_reference_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Rates]
      operationId: deleteCompanyFiscalRateReference
      description: Deletes the selected company-scoped fiscal rate reference.
      x-required-scopes: ["fiscal:rates:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: rate_reference_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/tax-rule-sets:
    get:
      tags: [Fiscal Rules]
      operationId: listCompanyFiscalTaxRuleSets
      x-required-scopes: ["fiscal:rules:read"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      responses:
        "200": { $ref: "#/components/responses/Collection" }
    post:
      tags: [Fiscal Rules]
      operationId: createCompanyFiscalTaxRuleSet
      description: Creates a company-scoped fiscal tax rule set.
      x-required-scopes: ["fiscal:rules:write"]
      parameters: [{ $ref: "#/components/parameters/CompanyId" }]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/fiscal/tax-rule-sets/{tax_rule_set_id}:
    put:
      tags: [Fiscal Rules]
      operationId: updateCompanyFiscalTaxRuleSet
      description: Updates the selected company-scoped fiscal tax rule set.
      x-required-scopes: ["fiscal:rules:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: tax_rule_set_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
    delete:
      tags: [Fiscal Rules]
      operationId: deleteCompanyFiscalTaxRuleSet
      description: Deletes the selected company-scoped fiscal tax rule set.
      x-required-scopes: ["fiscal:rules:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: tax_rule_set_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/documents/{operation_code}/preview:
    post:
      tags: [Documents]
      operationId: previewCompanyDocumentByOperation
      description: Resolves the fiscal operation by code and previews a document from a snapshot-shaped input contract without persisting or queueing emission.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/OperationCode"
      requestBody: { $ref: "#/components/requestBodies/OperationDocumentPreview" }
      responses:
        "200": { $ref: "#/components/responses/DocumentPreviewResponse" }
  /company/{company_id}/documents:
    get:
      tags: [Documents]
      operationId: listCompanyDocuments
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/DocumentTypeQuery"
      responses:
        "200": { $ref: "#/components/responses/DocumentListResponse" }
  /company/{company_id}/documents/{operation_code}:
    post:
      tags: [Documents]
      operationId: createCompanyDocumentByOperation
      description: Resolves the fiscal operation by code and queues a document from a snapshot-shaped input contract. Requires `Idempotency-Key` and returns `202 Accepted` when the document was queued instead of completed inline.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/OperationCode"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { $ref: "#/components/requestBodies/OperationDocumentSubmit" }
      responses:
        "202": { $ref: "#/components/responses/DocumentAcceptedResponse" }
  /company/{company_id}/documents/{external_id}:
    get:
      tags: [Documents]
      operationId: getCompanyDocument
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      responses:
        "200": { $ref: "#/components/responses/DocumentDetailResponse" }
  /company/{company_id}/documents/{external_id}/xml:
    get:
      tags: [Documents]
      operationId: downloadCompanyDocumentXml
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      responses:
        "200":
          description: XML autorizado completo, preferencialmente `nfeProc` para NF-e/NFC-e.
          content:
            application/xml:
              schema: { type: string }
        "409":
          description: Artefato fiscal ainda em processamento.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtifactProcessingError" }
  /company/{company_id}/documents/{external_id}/pdf:
    get:
      tags: [Documents]
      operationId: downloadCompanyDocumentPdf
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      responses:
        "200":
          description: PDF/DANFE/DANFC-e quando aplicável.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "409":
          description: Artefato fiscal ainda em processamento.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtifactProcessingError" }
  /company/{company_id}/documents/{external_id}/snapshot:
    get:
      tags: [Documents]
      operationId: getCompanyDocumentSnapshot
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      responses:
        "200": { $ref: "#/components/responses/DocumentSnapshotResponse" }
  /company/{company_id}/documents/{external_id}/query:
    post:
      tags: [Documents]
      operationId: queryCompanyDocument
      description: Triggers an on-demand provider query for the stored document and returns the refreshed local and remote state. Use POST because it may contact external providers and persist refreshed artifacts.
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
        - name: force_remote
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/DocumentQueryResponse" }
  /company/{company_id}/documents/{external_id}/cancel:
    post:
      tags: [Documents]
      operationId: cancelCompanyDocument
      description: Requests fiscal cancellation for the stored document and persists the resulting state transition.
      x-required-scopes: ["documents:cancel"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/documents/{external_id}/correct:
    post:
      tags: [Documents]
      operationId: correctCompanyDocument
      description: Requests a correction event for the stored document and persists the resulting correction metadata.
      x-required-scopes: ["documents:correct"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/ExternalId"
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/Resource" }
  /company/{company_id}/direct/documents:
    post:
      tags: [Documents]
      operationId: createCompanyDirectDocument
      description: Queues a direct complete-form transmission flow. Requires `Idempotency-Key` and returns `202 Accepted` when the transmission was queued for processing. Direct payloads are normalized to a canonical internal contract before transmission. Legacy aliases are still accepted temporarily on direct routes and are adapted with internal compatibility warnings/audit metadata. When `document_type=nfse` and the resolved provider is `nfse_nacional`/`manaus`, prefer the canonical PT-BR root contract in `payload`; incompatible payloads that cannot be normalized still fail with `422`.
      x-required-scopes: ["documents:direct"]
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { $ref: "#/components/requestBodies/DocumentSubmit" }
      responses:
