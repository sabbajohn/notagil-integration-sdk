components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ExternalId:
      name: external_id
      in: path
      required: true
      schema: { type: string, maxLength: 120 }
      description: Identificador externo informado no envelope de criacao.
    DocumentType:
      name: document_type
      in: path
      required: true
      schema:
        type: string
        enum: [nfe, nfce, nfse]
    TipoDocumento:
      name: tipo_documento
      in: path
      required: true
      schema:
        type: string
        enum: [nfe, nfce, nfse]
    AmbienteFiscal:
      name: ambiente_fiscal
      in: query
      required: false
      schema:
        type: string
        enum: [homologacao, producao]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, maxLength: 120 }
      description: Chave idempotente obrigatoria para emissao direta.
    PerfilOperacaoId:
      name: perfil
      in: path
      required: true
      schema: { type: integer }
    ReferenciaAliquotaId:
      name: referencia
      in: path
      required: true
      schema: { type: integer }
    ConjuntoRegraId:
      name: conjunto_regra
      in: path
      required: true
      schema: { type: integer }
    CodigoOperacao:
      name: codigo_operacao
      in: path
      required: true
      schema: { type: string, maxLength: 80 }
      description: Codigo publico do perfil de operacao fiscal.
    AgendamentoId:
      name: agendamento
      in: path
      required: true
      schema: { type: string }
    NotificacaoWebId:
      name: notificacao_web
      in: path
      required: true
      schema: { type: integer }
  requestBodies:
    JsonObject:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    DirectDocumentAcceptedResponse:
      description: Documento aceito ou replay idempotente.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DirectDocumentAcceptedEnvelope"
    ContractInfoResponse:
      description: Discovery do contrato fiscal v2.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ContractInfoEnvelope"
    NfseProviderInfoResponse:
      description: Informacoes do provedor NFSe no vocabulario publico v2.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InformacoesProvedorNfseEnvelope"
    ValidarCscNfceResponse:
      description: Resultado da validacao de CSC da NFCe.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidacaoCscNfceEnvelope"
    CompanyConfigurationResponse:
      description: Configuracao da empresa vinculada ao token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConfiguracaoEmpresaEnvelope"
    OperationPreviewResponse:
      description: Pre-visualizacao da emissao por operacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OperationPreviewEnvelope"
    OperationDocumentAcceptedResponse:
      description: Documento aceito, emitido ou replay idempotente por operacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OperationDocumentAcceptedEnvelope"
    ScheduleCollectionResponse:
      description: Lista de agendamentos.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AgendamentoListEnvelope"
    ScheduleResponse:
      description: Agendamento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AgendamentoEnvelope"
    WebhookCollectionResponse:
      description: Lista de notificacoes web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookListEnvelope"
    WebhookResponse:
      description: Notificacao web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookEnvelope"
    WebhookDeliveryResponse:
      description: Entrega de notificacao web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookDeliveryEnvelope"
    WebhookDeliveryCollectionResponse:
      description: Lista de entregas de notificacao web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookDeliveryListEnvelope"
    DocumentListResponse:
      description: Lista de documentos.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentListEnvelope"
    DocumentDetailResponse:
      description: Detalhe do documento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentDetailEnvelope"
    RetratoDocumentoResponse:
      description: Retrato fiscal persistido.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RetratoDocumentoEnvelope"
    ConsultarDocumentoResponse:
      description: Resultado de consulta do documento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConsultarDocumentoEnvelope"
    DocumentOperationResponse:
      description: Resultado de operacao sobre documento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentOperationEnvelope"
    PerfilOperacaoListResponse:
      description: Lista de perfis de operacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PerfilOperacaoListEnvelope"
    PerfilOperacaoResponse:
      description: Perfil de operacao fiscal.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PerfilOperacaoEnvelope"
    ReferenciaAliquotaListResponse:
      description: Lista de referencias de aliquotas.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReferenciaAliquotaListEnvelope"
    ReferenciaAliquotaResponse:
      description: Referencia de aliquota fiscal.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReferenciaAliquotaEnvelope"
    ConjuntoRegraTributariaListResponse:
      description: Lista de conjuntos de regras tributarias.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConjuntoRegraTributariaListEnvelope"
    ConjuntoRegraTributariaResponse:
      description: Conjunto de regras tributarias.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConjuntoRegraTributariaEnvelope"
    GenericResourceResponse:
      description: Recurso no envelope publico v2.
      content:
        application/json:
          schema:
            type: object
            required: [dados]
            properties:
              dados:
                type: object
                additionalProperties: true
              metadados:
                type: object
                additionalProperties: true
    GenericCollectionResponse:
      description: Colecao no envelope publico v2.
      content:
        application/json:
          schema:
            type: object
            required: [dados]
            properties:
              dados:
                type: array
                items:
                  type: object
                  additionalProperties: true
              metadados:
                type: object
                additionalProperties: true
    DeleteResponse:
      description: Resultado de exclusao ou desativacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeleteEnvelope"
    ErrorResponse:
      description: Erro padronizado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    DirectDocumentRequestV2:
      type: object
      required: [external_id, document_type, payload]
      additionalProperties: false
      properties:
        external_id:
          type: string
          maxLength: 120
        document_type:
          type: string
          enum: [nfe, nfce, nfse]
        municipio:
          type: string
          maxLength: 120
        ambiente_fiscal:
          type: string
          enum: [homologacao, producao]
        modo_emissao:
          type: string
          enum: [fila, sincrono]
          description: Use sincrono somente com document_type=nfce.
        sincrono:
          type: boolean
        payload:
          $ref: "#/components/schemas/FiscalCanonicalPayloadV2"
        metadata:
          type: object
          additionalProperties: true
    AtualizarConfiguracaoEmpresaV2:
      type: object
      additionalProperties: false
      properties:
        cnpj: { type: string, maxLength: 20 }
        razao_social: { type: string, maxLength: 255 }
        nome_fantasia: { type: string, maxLength: 255 }
        situacao: { type: string, enum: [ativo, inativo] }
        email: { type: string, nullable: true, maxLength: 255 }
        telefone: { type: string, nullable: true, maxLength: 60 }
        logradouro: { type: string, nullable: true, maxLength: 255 }
        numero: { type: string, nullable: true, maxLength: 50 }
        complemento: { type: string, nullable: true, maxLength: 255 }
        bairro: { type: string, nullable: true, maxLength: 255 }
        cep: { type: string, nullable: true, maxLength: 20 }
        municipio: { type: string, nullable: true, maxLength: 255 }
        uf: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        codigo_ibge: { type: string, nullable: true, maxLength: 20 }
        regime_tributario: { type: string, nullable: true, maxLength: 60 }
        crt: { type: string, nullable: true, maxLength: 10 }
        cnae_principal: { type: string, nullable: true, maxLength: 255 }
        tamanho_empresa: { type: string, nullable: true, maxLength: 20 }
        tipo_contribuinte_icms: { type: string, nullable: true, maxLength: 20 }
        contribuinte_iss: { type: boolean }
        indicador_ie: { type: string, nullable: true, maxLength: 20 }
        indicador_im: { type: string, nullable: true, maxLength: 20 }
        natureza_juridica: { type: string, nullable: true, maxLength: 40 }
        codigo_regime_especial: { type: string, nullable: true, maxLength: 30 }
        codigo_pais: { type: string, nullable: true, maxLength: 4 }
        mei: { type: boolean }
        me: { type: boolean }
        epp: { type: boolean }
        simples_nacional: { type: boolean }
        lucro_real: { type: boolean }
        lucro_presumido: { type: boolean }
        inscricao_estadual: { type: string, nullable: true, maxLength: 60 }
        inscricao_municipal: { type: string, nullable: true, maxLength: 60 }
        id_csc: { type: string, nullable: true, maxLength: 20 }
        token_csc: { type: string, nullable: true, maxLength: 255 }
        url_logo: { type: string, nullable: true }
        lote_prefixo: { type: string, nullable: true, maxLength: 40 }
        lote_sincrono: { type: boolean }
        layout_cupom:
          type: object
          nullable: true
          additionalProperties: true
        nfce:
          type: object
          nullable: true
          additionalProperties: true
          description: Use id_csc e token_csc em ambientes homologacao/producao.
        nfse:
          type: object
          nullable: true
          additionalProperties: true
          description: Use provedor e codigo_municipio em vez de provider_key e codigo_ibge.
    OperationPreviewRequestV2:
      type: object
      required: [document_type, retrato]
      additionalProperties: false
      properties:
        external_id: { type: string, maxLength: 120 }
        document_type: { type: string, enum: [nfe, nfce, nfse] }
        municipio: { type: string, maxLength: 120 }
        retrato:
          $ref: "#/components/schemas/RetratoOperacionalRequestV2"
        metadata:
          type: object
          additionalProperties: true
    OperationDocumentRequestV2:
      type: object
      required: [external_id, document_type, retrato]
      additionalProperties: false
      properties:
        external_id: { type: string, maxLength: 120 }
        document_type: { type: string, enum: [nfe, nfce, nfse] }
        municipio: { type: string, maxLength: 120 }
        modo_emissao:
          type: string
          enum: [fila, sincrono]
          description: Use sincrono somente com document_type=nfce.
        sincrono:
          type: boolean
        retrato:
          $ref: "#/components/schemas/RetratoOperacionalRequestV2"
        metadata:
          type: object
          additionalProperties: true
    RetratoOperacionalRequestV2:
      type: object
      required: [items]
      additionalProperties: true
      properties:
        fiscal_environment:
          type: string
          enum: [homologacao, producao]
          description: Campo interno do retrato operacional legado. A emissao direta v2 usa ambiente_fiscal no envelope.
        reference_date: { type: string, format: date-time }
        document_direction: { type: string, enum: [entrada, saida] }
        document_data:
          type: object
          additionalProperties: true
        counterparty:
          type: object
          additionalProperties: true
        document_references:
          type: array
          items:
            type: object
            additionalProperties: true
        items:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true
    AgendamentoRequestV2:
      type: object
      required: [tipo, proxima_execucao]
      additionalProperties: false
      properties:
        tipo:
          type: string
          enum: [unica, recorrente]
        frequencia:
          type: string
          nullable: true
          enum: [mensal, semanal]
        nota_base:
          type: object
          nullable: true
          additionalProperties: true
        proxima_execucao:
          type: string
          format: date-time
        ativo:
          type: boolean
    WebhookRequestV2:
      type: object
      required: [url, eventos]
      additionalProperties: false
      properties:
        url: { type: string, format: uri, maxLength: 2048 }
        descricao: { type: string, nullable: true, maxLength: 255 }
        situacao:
          type: string
          enum: [ativo, pausado]
        ambiente:
          type: string
          enum: [todos, homologacao, producao]
        eventos:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - fiscal_document.created
              - fiscal_document.authorized
              - fiscal_document.rejected
              - fiscal_document.cancelled
              - fiscal_document.corrected
              - fiscal_document.failed
              - inbound_nfe.discovered
              - inbound_nfe.updated
              - inbound_nfe.xml_available
              - inbound_nfe.cancelled
              - inbound_nfe.corrected
              - inbound_nfe.manifested
              - inbound_nfe.event
    FiscalCanonicalPayloadV2:
      type: object
      required: [identificacao, emitente, tomador, itens]
      additionalProperties: false
      properties:
        identificacao:
          $ref: "#/components/schemas/IdentificacaoFiscalV2"
        emitente:
          $ref: "#/components/schemas/ParteFiscalV2"
        tomador:
          $ref: "#/components/schemas/ParteFiscalV2"
        itens:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ItemFiscalV2"
        servico:
          $ref: "#/components/schemas/ServicoFiscalV2"
        pagamento:
          $ref: "#/components/schemas/PagamentoFiscalV2"
        transporte:
          $ref: "#/components/schemas/TransporteFiscalV2"
        referencias:
          type: array
          items:
            $ref: "#/components/schemas/ReferenciaFiscalV2"
        totais:
          $ref: "#/components/schemas/TotaisFiscalV2"
        impostos:
          $ref: "#/components/schemas/ImpostosFiscalV2"
        observacoes:
          $ref: "#/components/schemas/ObservacoesFiscalV2"
        extensoes:
          type: object
          additionalProperties: true
    IdentificacaoFiscalV2:
      type: object
      additionalProperties: false
      properties:
        serie: { type: string }
        numero: { type: string }
        natureza_operacao: { type: string }
        data_emissao: { type: string, format: date-time }
        data_competencia: { type: string, format: date }
        ambiente: { type: string, enum: [homologacao, producao] }
        municipio_ocorrencia_codigo: { type: string }
        presenca: { type: integer }
        intermediador: { type: integer }
    ParteFiscalV2:
      type: object
      additionalProperties: false
      properties:
        documento: { type: string }
        cpf: { type: string }
        cnpj: { type: string }
        nome: { type: string }
        razao_social: { type: string }
        nome_fantasia: { type: string }
        tipo_pessoa: { type: string, enum: [fisica, juridica, estrangeiro] }
        inscricao_estadual: { type: string }
        inscricao_municipal: { type: string }
        crt: { type: string }
        email: { type: string, format: email }
        telefone: { type: string }
        endereco:
          $ref: "#/components/schemas/EnderecoFiscalV2"
    EnderecoFiscalV2:
      type: object
      additionalProperties: false
      properties:
        logradouro: { type: string }
        numero: { type: string }
        complemento: { type: string }
        bairro: { type: string }
        municipio: { type: string }
        uf: { type: string, minLength: 2, maxLength: 2 }
        cep: { type: string }
        codigo_municipio: { type: string }
        codigo_ibge: { type: string }
    ItemFiscalV2:
      type: object
      required: [descricao, quantidade, valor_unitario]
      additionalProperties: false
      properties:
        codigo: { type: string }
        descricao: { type: string }
        quantidade: { type: number }
        valor_unitario: { type: number }
        valor_total: { type: number }
        unidade: { type: string }
        ncm: { type: string }
        cfop: { type: string }
        impostos:
          $ref: "#/components/schemas/ImpostosFiscalV2"
    ServicoFiscalV2:
      type: object
      additionalProperties: false
      properties:
        codigo_servico_nacional: { type: string }
        codigo_servico_municipal: { type: string }
        codigo_nbs: { type: string }
        codigo_municipio_prestacao: { type: string }
        municipio_prestacao_codigo: { type: string }
        descricao: { type: string }
        aliquota_iss: { type: number }
        aliquota: { type: number }
        iss_retido: { type: boolean }
        tributacao_iss: { type: string }
        valor_irrf: { type: number }
        valor_ir: { type: number }
    PagamentoFiscalV2:
      type: object
      additionalProperties: false
      properties:
        meios:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              meio: { type: string }
              valor: { type: number }
    TransporteFiscalV2:
      type: object
      additionalProperties: false
      properties:
        modalidade_frete: { type: string }
    ReferenciaFiscalV2:
      type: object
      additionalProperties: false
      properties:
        chave: { type: string }
        tipo: { type: string }
    TotaisFiscalV2:
      type: object
      additionalProperties: false
      properties:
        valor_produtos: { type: number }
        valor_servicos: { type: number }
        valor_descontos: { type: number }
        valor_documento: { type: number }
    ImpostosFiscalV2:
      type: object
      additionalProperties: false
      properties:
        icms: { $ref: "#/components/schemas/TributoFiscalV2" }
        iss: { $ref: "#/components/schemas/TributoFiscalV2" }
        pis: { $ref: "#/components/schemas/TributoFiscalV2" }
        cofins: { $ref: "#/components/schemas/TributoFiscalV2" }
        ibs: { $ref: "#/components/schemas/TributoFiscalV2" }
        cbs: { $ref: "#/components/schemas/TributoFiscalV2" }
    TributoFiscalV2:
      type: object
      additionalProperties: false
      properties:
        cst: { type: string }
        csosn: { type: string }
        aliquota: { type: number }
        base_calculo: { type: number }
        valor: { type: number }
    ObservacoesFiscalV2:
      type: object
      additionalProperties: false
      properties:
        contribuinte: { type: string }
        fisco: { type: string }
        texto: { type: string }
    ConsultarDocumentoRequestV2:
      type: object
      additionalProperties: false
      properties:
        ambiente_fiscal:
          type: string
          enum: [homologacao, producao]
        forcar_consulta_remota:
          type: boolean
          default: false
    CancelarDocumentoRequestV2:
      type: object
      required: [justificativa]
      additionalProperties: false
      properties:
        justificativa:
          type: string
          maxLength: 255
    CorrigirDocumentoRequestV2:
      type: object
      required: [correcao]
      additionalProperties: false
      properties:
        correcao:
          type: string
          minLength: 15
          maxLength: 1000
        sequencia:
          type: integer
          minimum: 1
          maximum: 20
    ValidarCscNfceRequestV2:
      type: object
      additionalProperties: false
      properties:
        ambiente_fiscal:
          type: string
          enum: [homologacao, producao]
        id_csc:
          type: string
          maxLength: 20
        token_csc:
          type: string
          maxLength: 255
          writeOnly: true
        nfce:
          type: object
          additionalProperties: false
          properties:
            homologacao:
              $ref: "#/components/schemas/CscNfceAmbienteV2"
            producao:
              $ref: "#/components/schemas/CscNfceAmbienteV2"
    CscNfceAmbienteV2:
      type: object
      additionalProperties: false
      properties:
        id_csc:
          type: string
          maxLength: 20
        token_csc:
          type: string
          maxLength: 255
          writeOnly: true
    PerfilOperacaoFiscalRequestV2:
      type: object
      additionalProperties: false
      properties:
        codigo: { type: string, maxLength: 80 }
        nome: { type: string, maxLength: 255 }
        situacao: { type: string, enum: [ativo, inativo] }
        inicio_vigencia: { type: string, format: date }
        fim_vigencia: { type: string, format: date, nullable: true }
        metadados:
          type: object
          additionalProperties: true
        escopos_documento:
          type: array
          items: { type: string, enum: [nfe, nfce, nfse, cte, mdfe] }
        direcao: { type: string, enum: [entrada, saida] }
        finalidade: { type: string, maxLength: 30, nullable: true }
        indicador_presenca: { type: string, nullable: true }
        incidencia_principal: { type: string, maxLength: 20, nullable: true }
        politica_preco: { type: string }
        gera_financeiro: { type: boolean }
        devolucao: { type: boolean }
        exige_documento_referenciado: { type: boolean }
        familia_tributaria: { type: string, maxLength: 30, nullable: true }
        origem_mercadoria: { type: string, nullable: true }
        regimes_tributarios_permitidos:
          type: array
          items: { type: string }
        exige_dados_transporte: { type: boolean }
        cfops_permitidos:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [cfop_id]
            properties:
              cfop_id: { type: integer }
              etiquetas:
                type: array
                items: { type: string, enum: [dentro, fora, exterior, st, combustivel, proprio] }
        cfops_referencia_permitidos:
          type: array
          items: { type: integer }
        efeitos_operacionais:
          type: object
          additionalProperties: false
          properties:
            politica_preco: { type: string }
            gera_financeiro: { type: boolean }
            devolucao: { type: boolean }
            exige_documento_referenciado: { type: boolean }
            exige_dados_transporte: { type: boolean }
            permite_sobrescrever_cfop_item: { type: boolean }
        permite_sobrescrever_cfop_item: { type: boolean }
    PerfilOperacaoFiscalV2:
      allOf:
        - $ref: "#/components/schemas/PerfilOperacaoFiscalRequestV2"
        - type: object
          properties:
            id: { type: string }
            escopo: { type: string, enum: [padrao_global, sobrescrita_empresa] }
            editavel: { type: boolean }
    ReferenciaAliquotaFiscalRequestV2:
      type: object
      additionalProperties: false
      properties:
        codigo: { type: string, maxLength: 80 }
        tributo: { type: string, enum: [icms, iss, ibs, cbs, pis, cofins, ipi, is] }
        nivel_jurisdicao: { type: string, enum: [federal, estadual, municipal] }
        tipo_aliquota: { type: string, maxLength: 40, nullable: true }
        tipo_valor: { type: string, maxLength: 40, nullable: true }
        uf: { type: string, minLength: 2, maxLength: 2, nullable: true }
        codigo_municipio: { type: string, maxLength: 20, nullable: true }
        municipio: { type: string, maxLength: 255, nullable: true }
        uf_origem: { type: string, minLength: 2, maxLength: 2, nullable: true }
        uf_destino: { type: string, minLength: 2, maxLength: 2, nullable: true }
        codigo_situacao_tributaria: { type: string, maxLength: 60, nullable: true }
        codigo_classificacao_tributaria: { type: string, maxLength: 80, nullable: true }
        escopo_documento: { type: string, maxLength: 30, nullable: true }
        escopo_item: { type: string, maxLength: 30, nullable: true }
        aliquota: { type: number, minimum: 0, maximum: 100 }
        inicio_vigencia: { type: string, format: date, nullable: true }
        fim_vigencia: { type: string, format: date, nullable: true }
        ativo: { type: boolean }
        fonte: { type: string, maxLength: 255, nullable: true }
        url_fonte: { type: string, maxLength: 255, nullable: true }
        metadados:
          type: object
          additionalProperties: true
    ReferenciaAliquotaFiscalV2:
      allOf:
        - $ref: "#/components/schemas/ReferenciaAliquotaFiscalRequestV2"
        - type: object
          properties:
            id: { type: string }
            escopo: { type: string, enum: [padrao_global, sobrescrita_empresa] }
            editavel: { type: boolean }
    ConjuntoRegraTributariaRequestV2:
      type: object
      additionalProperties: false
      properties:
        codigo: { type: string, maxLength: 80 }
        nome: { type: string, maxLength: 255 }
