      description: Resolve a operacao fiscal pelo codigo e retorna a pre-visualizacao do retrato para a empresa vinculada ao token. Use tipo_documento e metadados; document_type, metadata, snapshot, emission_mode, synchronous e camelCase no envelope sao rejeitados.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/CodigoOperacao"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperationPreviewRequestV2"
      responses:
        "200": { $ref: "#/components/responses/OperationPreviewResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /operacoes/{codigo_operacao}/emitir:
    post:
      tags: [Emissoes]
      operationId: emitirDocumentoPorOperacaoV2
      description: Requer Idempotency-Key. Enfileira ou emite NFCe de forma sincrona a partir de um retrato operacional e do codigo da operacao fiscal. Use tipo_documento e metadados; document_type e metadata sao rejeitados.
      x-required-scopes: ["documents:write"]
      parameters:
        - $ref: "#/components/parameters/CodigoOperacao"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperationDocumentRequestV2"
      responses:
        "200": { $ref: "#/components/responses/OperationDocumentAcceptedResponse" }
        "202": { $ref: "#/components/responses/OperationDocumentAcceptedResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /agendamentos:
    get:
      tags: [Agendamentos]
      operationId: listarAgendamentosV2
      description: Lista agendamentos da empresa vinculada ao token.
      x-required-scopes: ["schedules:read"]
      responses:
        "200": { $ref: "#/components/responses/ScheduleCollectionResponse" }
    post:
      tags: [Agendamentos]
      operationId: criarAgendamentoV2
      description: Cria agendamento usando campos publicos em portugues. next_execution, active e camelCase sao rejeitados.
      x-required-scopes: ["schedules:write"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgendamentoRequestV2"
      responses:
        "201": { $ref: "#/components/responses/ScheduleResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /agendamentos/{agendamento}:
    put:
      tags: [Agendamentos]
      operationId: atualizarAgendamentoV2
      x-required-scopes: ["schedules:write"]
      parameters:
        - $ref: "#/components/parameters/AgendamentoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgendamentoRequestV2"
      responses:
        "200": { $ref: "#/components/responses/ScheduleResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    delete:
      tags: [Agendamentos]
      operationId: excluirAgendamentoV2
      x-required-scopes: ["schedules:delete"]
      parameters:
        - $ref: "#/components/parameters/AgendamentoId"
      responses:
        "200": { $ref: "#/components/responses/DeleteResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /notificacoes-web:
    get:
      tags: [Webhooks]
      operationId: listarNotificacoesWebV2
      description: Lista webhooks da chave de integracao. A empresa e implicita pelo token.
      x-required-scopes: ["webhooks:read"]
      responses:
        "200": { $ref: "#/components/responses/WebhookCollectionResponse" }
    post:
      tags: [Webhooks]
      operationId: criarNotificacaoWebV2
      description: Cria webhook usando descricao, situacao, ambiente e eventos em portugues. description, status, environment, events e camelCase sao rejeitados.
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequestV2"
      responses:
        "201": { $ref: "#/components/responses/WebhookResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /notificacoes-web/{notificacao_web}:
    put:
      tags: [Webhooks]
      operationId: atualizarNotificacaoWebV2
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - $ref: "#/components/parameters/NotificacaoWebId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequestV2"
      responses:
        "200": { $ref: "#/components/responses/WebhookResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    delete:
      tags: [Webhooks]
      operationId: excluirNotificacaoWebV2
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - $ref: "#/components/parameters/NotificacaoWebId"
      responses:
        "200": { $ref: "#/components/responses/DeleteResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /notificacoes-web/{notificacao_web}/rotacionar-segredo:
    post:
      tags: [Webhooks]
      operationId: rotacionarSegredoNotificacaoWebV2
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - $ref: "#/components/parameters/NotificacaoWebId"
      responses:
        "200": { $ref: "#/components/responses/WebhookResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /notificacoes-web/{notificacao_web}/testar:
    post:
      tags: [Webhooks]
      operationId: testarNotificacaoWebV2
      x-required-scopes: ["webhooks:write", "webhooks:manage"]
      parameters:
        - $ref: "#/components/parameters/NotificacaoWebId"
      responses:
        "200": { $ref: "#/components/responses/WebhookDeliveryResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /notificacoes-web/{notificacao_web}/entregas:
    get:
      tags: [Webhooks]
      operationId: listarEntregasNotificacaoWebV2
      x-required-scopes: ["webhooks:read"]
      parameters:
        - $ref: "#/components/parameters/NotificacaoWebId"
      responses:
        "200": { $ref: "#/components/responses/WebhookDeliveryCollectionResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /documentos:
    get:
      tags: [Documents]
      operationId: listarDocumentosV2
      description: Lista documentos usando filtros publicos em portugues. Aliases como document_type, operational_status, created_from e per_page sao rejeitados na v2.
      x-required-scopes: ["documents:read"]
      parameters:
        - name: external_id
          in: query
          schema: { type: string, maxLength: 120 }
        - name: tipo_documento
          in: query
          schema: { type: string, enum: [nfe, nfce, nfse] }
        - name: status_operacional
          in: query
          schema: { type: string, maxLength: 40 }
        - name: status_fiscal
          in: query
          schema: { type: string, maxLength: 40 }
        - name: criado_de
          in: query
          schema: { type: string, format: date }
        - name: criado_ate
          in: query
          schema: { type: string, format: date }
        - name: por_pagina
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
      responses:
        "200": { $ref: "#/components/responses/DocumentListResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /documentos/{external_id}:
    get:
      tags: [Documents]
      operationId: obterDocumentoV2
      description: Consulta um documento pelo external_id do envelope publico.
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
      responses:
        "200": { $ref: "#/components/responses/DocumentDetailResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /documentos/{external_id}/xml:
    get:
      tags: [Documents]
      operationId: baixarXmlDocumentoV2
      description: Baixa o XML do documento. Use ambiente_fiscal como query param quando precisar selecionar ambiente.
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
        - $ref: "#/components/parameters/AmbienteFiscal"
      responses:
        "200":
          description: XML do documento.
          content:
            application/xml:
              schema: { type: string }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /documentos/{external_id}/pdf:
    get:
      tags: [Documents]
      operationId: baixarPdfDocumentoV2
      description: Baixa o PDF do documento. Use ambiente_fiscal como query param quando precisar selecionar ambiente.
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
        - $ref: "#/components/parameters/AmbienteFiscal"
      responses:
        "200":
          description: PDF do documento.
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /documentos/{external_id}/retrato:
    get:
      tags: [Documents]
      operationId: obterRetratoDocumentoV2
      description: Retorna o retrato fiscal persistido do documento.
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
        - $ref: "#/components/parameters/AmbienteFiscal"
      responses:
        "200": { $ref: "#/components/responses/RetratoDocumentoResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /documentos/{external_id}/consultar:
    post:
      tags: [Documents]
      operationId: consultarDocumentoV2
      description: Consulta o documento usando campos publicos em portugues. force_remote, fiscal_environment, document_key e camelCase sao rejeitados.
      x-required-scopes: ["documents:read"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultarDocumentoRequestV2"
      responses:
        "200": { $ref: "#/components/responses/ConsultarDocumentoResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /documentos/{external_id}/cancelar:
    post:
      tags: [Documents]
      operationId: cancelarDocumentoV2
      description: Cancela documento autorizado usando justificativa em portugues. reason, protocol e document_key sao rejeitados.
      x-required-scopes: ["documents:cancel"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelarDocumentoRequestV2"
      responses:
        "200": { $ref: "#/components/responses/DocumentOperationResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /documentos/{external_id}/corrigir:
    post:
      tags: [Documents]
      operationId: corrigirDocumentoV2
      description: Emite carta de correcao usando correcao e sequencia. correction e sequence sao rejeitados.
      x-required-scopes: ["documents:correct"]
      parameters:
        - $ref: "#/components/parameters/ExternalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrigirDocumentoRequestV2"
      responses:
        "200": { $ref: "#/components/responses/DocumentOperationResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ExternalId:
      name: external_id
      in: path
      required: true
      schema: { type: string, maxLength: 120 }
      description: Identificador externo informado no envelope de criacao.
    TipoDocumento:
      name: tipo_documento
      in: path
      required: true
      schema:
        type: string
        enum: [nfe, nfce, nfse]
    AmbienteFiscal:
      name: ambiente_fiscal
      in: query
      required: false
      schema:
        type: string
        enum: [homologacao, producao]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, maxLength: 120 }
      description: Chave idempotente obrigatoria para emissao direta.
    PerfilOperacaoId:
      name: perfil
      in: path
      required: true
      schema: { type: integer }
    ReferenciaAliquotaId:
      name: referencia
      in: path
      required: true
      schema: { type: integer }
    ConjuntoRegraId:
      name: conjunto_regra
      in: path
      required: true
      schema: { type: integer }
    CodigoOperacao:
      name: codigo_operacao
      in: path
      required: true
      schema: { type: string, maxLength: 80 }
      description: Codigo publico do perfil de operacao fiscal.
    AgendamentoId:
      name: agendamento
      in: path
      required: true
      schema: { type: string }
    NotificacaoWebId:
      name: notificacao_web
      in: path
      required: true
      schema: { type: integer }
  responses:
    DirectDocumentAcceptedResponse:
      description: Documento aceito ou replay idempotente.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DirectDocumentAcceptedEnvelope"
    ContractInfoResponse:
      description: Discovery do contrato fiscal v2.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ContractInfoEnvelope"
    NfseProviderInfoResponse:
      description: Informacoes do provedor NFSe no vocabulario publico v2.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InformacoesProvedorNfseEnvelope"
    ValidarCscNfceResponse:
      description: Resultado da validacao de CSC da NFCe.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidacaoCscNfceEnvelope"
    CompanyConfigurationResponse:
      description: Configuracao da empresa vinculada ao token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConfiguracaoEmpresaEnvelope"
    OperationPreviewResponse:
      description: Pre-visualizacao da emissao por operacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OperationPreviewEnvelope"
    OperationDocumentAcceptedResponse:
      description: Documento aceito, emitido ou replay idempotente por operacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OperationDocumentAcceptedEnvelope"
    ScheduleCollectionResponse:
      description: Lista de agendamentos.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AgendamentoListEnvelope"
    ScheduleResponse:
      description: Agendamento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AgendamentoEnvelope"
    WebhookCollectionResponse:
      description: Lista de notificacoes web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookListEnvelope"
    WebhookResponse:
      description: Notificacao web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookEnvelope"
    WebhookDeliveryResponse:
      description: Entrega de notificacao web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookDeliveryEnvelope"
    WebhookDeliveryCollectionResponse:
      description: Lista de entregas de notificacao web.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookDeliveryListEnvelope"
    DocumentListResponse:
      description: Lista de documentos.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentListEnvelope"
    DocumentDetailResponse:
      description: Detalhe do documento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentDetailEnvelope"
    RetratoDocumentoResponse:
      description: Retrato fiscal persistido.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RetratoDocumentoEnvelope"
    ConsultarDocumentoResponse:
      description: Resultado de consulta do documento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConsultarDocumentoEnvelope"
    DocumentOperationResponse:
      description: Resultado de operacao sobre documento.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentOperationEnvelope"
    PerfilOperacaoListResponse:
      description: Lista de perfis de operacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PerfilOperacaoListEnvelope"
    PerfilOperacaoResponse:
      description: Perfil de operacao fiscal.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PerfilOperacaoEnvelope"
    ReferenciaAliquotaListResponse:
      description: Lista de referencias de aliquotas.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReferenciaAliquotaListEnvelope"
    ReferenciaAliquotaResponse:
      description: Referencia de aliquota fiscal.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReferenciaAliquotaEnvelope"
    ConjuntoRegraTributariaListResponse:
      description: Lista de conjuntos de regras tributarias.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConjuntoRegraTributariaListEnvelope"
    ConjuntoRegraTributariaResponse:
      description: Conjunto de regras tributarias.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConjuntoRegraTributariaEnvelope"
    GenericResourceResponse:
      description: Recurso no envelope publico v2.
      content:
        application/json:
          schema:
            type: object
            required: [dados]
            properties:
              dados:
                type: object
                additionalProperties: true
              metadados:
                type: object
                additionalProperties: true
    CertificadoOrigemResponse:
      description: Configuração efetiva da origem do certificado da empresa consumidora.
      content:
        application/json:
          schema:
            type: object
            required: [dados]
            properties:
              dados:
                $ref: "#/components/schemas/CertificadoOrigemStatusV2"
    GenericCollectionResponse:
      description: Colecao no envelope publico v2.
      content:
        application/json:
          schema:
            type: object
            required: [dados]
            properties:
              dados:
                type: array
                items:
                  type: object
                  additionalProperties: true
              metadados:
                type: object
                additionalProperties: true
    DeleteResponse:
      description: Resultado de exclusao ou desativacao.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeleteEnvelope"
    ErrorResponse:
      description: Erro padronizado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            alias_rejeitado:
              summary: Campo legado ou alias rejeitado
              value:
                mensagem: Payload invalido para a superficie v2.
                codigo: validation_error
                erros:
                  document_type:
                    - Campo nao permitido na superficie v2. Use somente campos publicos documentados.
            sincrono_nao_permitido:
              summary: Emissao sincrona fora de NFCe
              value:
                mensagem: Emissao sincrona esta disponivel apenas para NFCe.
                codigo: validation_error
  schemas:
    DirectDocumentRequestV2:
      type: object
      required: [external_id, tipo_documento, payload]
      additionalProperties: false
      properties:
        external_id:
          type: string
          maxLength: 120
        tipo_documento:
          type: string
          enum: [nfe, nfce, nfse]
        municipio:
          type: string
          maxLength: 120
        ambiente_fiscal:
          type: string
          enum: [homologacao, producao]
        modo_emissao:
          type: string
          enum: [fila, sincrono]
          description: Use sincrono somente com tipo_documento=nfce.
        sincrono:
          type: boolean
        payload:
          $ref: "#/components/schemas/FiscalCanonicalPayloadV2"
        metadados:
          type: object
          additionalProperties: true
    DirectXmlDocumentRequestV2:
      type: object
      required: [external_id, tipo_documento]
      anyOf:
        - required: [xml]
        - required: [xml_em_base64]
      additionalProperties: false
      properties:
        external_id:
          type: string
          maxLength: 120
        tipo_documento:
          type: string
          enum: [nfe, nfce]
        municipio:
          type: string
          maxLength: 120
        ambiente_fiscal:
          type: string
          enum: [homologacao, producao]
        xml:
          type: string
          description: XML fiscal em texto.
        xml_em_base64:
          type: string
          description: XML fiscal codificado em base64. Use xml ou xml_em_base64.
        ja_assinado:
          type: boolean
          default: false
        id_lote:
          type: string
          maxLength: 30
        indicador_sincrono:
          type: integer
          enum: [0, 1]
        modo_emissao:
          type: string
          enum: [fila, sincrono]
          description: Use sincrono somente com tipo_documento=nfce.
        sincrono:
          type: boolean
        metadados:
          type: object
          additionalProperties: true
    ImportacaoImplantacaoRequestV2:
      type: object
      required: [tipo_origem]
      additionalProperties: false
      properties:
        tipo_origem:
          type: string
          enum: [xml, csv, documento]
        fluxo:
          type: string
          enum: [entrada, saida]
          nullable: true
        nome_arquivo:
          type: string
          maxLength: 255
          nullable: true
        xml:
          type: string
          nullable: true
          description: Obrigatorio quando tipo_origem=xml.
        linhas:
          type: array
          nullable: true
          description: Obrigatorio quando tipo_origem=csv.
          items:
            type: object
            additionalProperties: true
        documento:
          type: object
          nullable: true
          description: Obrigatorio quando tipo_origem=documento.
          additionalProperties: true
        itens:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
    RevisarImportacaoImplantacaoRequestV2:
      type: object
      additionalProperties: false
      properties:
        aprovar_todos:
          type: boolean
        itens:
          type: array
          items:
            type: object
            additionalProperties: true
            required: [id, status]
            properties:
              id: { type: integer }
              status:
                type: string
                enum: [aprovado, rejeitado, pendente_revisao]
    PromoverImportacaoImplantacaoRequestV2:
      type: object
      additionalProperties: false
      properties:
        aprovar_todos:
          type: boolean
    IbptItemRequestV2:
      type: object
      required: [uf, ncm, valor]
      additionalProperties: false
      properties:
        uf: { type: string, minLength: 2, maxLength: 2 }
        ncm: { type: string, minLength: 8, maxLength: 20 }
        valor: { type: number, minimum: 0 }
        extarif: { type: integer, minimum: 0, default: 0 }
        descricao: { type: string, nullable: true }
        unidade: { type: string, nullable: true }
        gtin: { type: string, nullable: true }
        codigo_interno: { type: string, nullable: true }
        codigo_origem: { type: string, nullable: true }
        tipo_mercadoria:
          type: string
          enum: [nacional, importada]
          nullable: true
        importado:
          type: boolean
          nullable: true
    IbptCupomRequestV2:
      type: object
      required: [itens]
      additionalProperties: false
      properties:
        uf:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
          description: UF padrao aplicada aos itens que nao informarem UF.
        itens:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            additionalProperties: true
            properties:
              id: {}
              linha: {}
