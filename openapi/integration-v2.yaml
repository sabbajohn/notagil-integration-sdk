openapi: 3.1.0
info:
  title: Fiscal Platform API - Integracoes v2
  version: "2.0.0"
  description: Superficie estrita para emissao direta com payload fiscal publico em portugues e snake_case. A empresa e resolvida pelo token de integracao.
servers:
  - url: /api/v2/integrations
security:
  - bearerAuth: []
paths:
  /openapi.yaml:
    get:
      tags: [Documentacao]
      operationId: baixarOpenApiIntegracoesV2
      description: Retorna este documento OpenAPI v2 em YAML. Endpoint sem aliases.
      security: []
      responses:
        "200":
          description: Documento OpenAPI v2 em YAML.
          content:
            application/yaml:
              schema:
                type: string
  /docs:
    get:
      tags: [Documentacao]
      operationId: visualizarDocsIntegracoesV2
      description: Exibe Swagger UI apontando para /api/v2/integrations/openapi.yaml. Endpoint sem aliases.
      security: []
      responses:
        "200":
          description: HTML da documentacao interativa.
          content:
            text/html:
              schema:
                type: string
  /contratos/{tipo_documento}:
    get:
      tags: [Contratos]
      operationId: obterContratoFiscalV2
      description: Retorna discovery do contrato FiscalCanonicalPayloadV2 por tipo de documento. Todos os campos retornados usam portugues e snake_case.
      x-required-scopes: ["configuration:read", "documents:direct"]
      parameters:
        - $ref: "#/components/parameters/TipoDocumento"
      responses:
        "200": { $ref: "#/components/responses/ContractInfoResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /direto/documentos:
    post:
      tags: [Documents]
      operationId: criarDocumentoDiretoV2
      description: Requer Idempotency-Key. Enfileira uma emissao direta usando FiscalCanonicalPayloadV2 estrito. O envelope usa tipo_documento e metadados; document_type, metadata e demais aliases legados sao rejeitados.
      x-required-scopes: ["documents:direct"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectDocumentRequestV2"
            examples:
              nfe:
                summary: NFe direta em fila
                value:
                  external_id: erp-nfe-1001
                  tipo_documento: nfe
                  ambiente_fiscal: homologacao
                  modo_emissao: fila
                  payload:
                    identificacao:
                      serie: "1"
                      numero: "1001"
                      natureza_operacao: Venda de mercadoria
                      data_emissao: "2026-06-20T10:00:00-03:00"
                      ambiente: homologacao
                    emitente:
                      cpf_cnpj: "12345678000199"
                      razao_social: Empresa Teste LTDA
                      inscricao_estadual: "252290720"
                      endereco:
                        logradouro: Rua Central
                        numero: "100"
                        bairro: Centro
                        codigo_municipio: "4209102"
                        municipio: Joinville
                        uf: SC
                        cep: "89217002"
                    tomador:
                      cpf_cnpj: "33440118000147"
                      razao_social: Padaria Bom Trigo LTDA
                      tipo_pessoa: juridica
                      inscricao_estadual: "0623079040081"
                      endereco:
                        logradouro: Avenida Brasil
                        numero: "100"
                        bairro: Centro
                        codigo_municipio: "3106200"
                        municipio: Belo Horizonte
                        uf: MG
                        cep: "30140071"
                    itens:
                      - codigo: SKU-001
                        descricao: Produto Teste
                        quantidade: 1
                        valor_unitario: 100
                        valor_total: 100
                        unidade: UN
                        ncm: "21069090"
                        cfop: "5102"
                    totais:
                      valor_produtos: 100
                      valor_documento: 100
              nfce:
                summary: NFCe direta sincrona
                value:
                  external_id: erp-nfce-2001
                  tipo_documento: nfce
                  ambiente_fiscal: homologacao
                  modo_emissao: sincrono
                  payload:
                    identificacao:
                      serie: "1"
                      numero: "2001"
                      natureza_operacao: Venda ao consumidor
                      data_emissao: "2026-06-20T10:00:00-03:00"
                      ambiente: homologacao
                    emitente:
                      cpf_cnpj: "12345678000199"
                      razao_social: Empresa Teste LTDA
                      inscricao_estadual: "252290720"
                      endereco:
                        logradouro: Rua Central
                        numero: "100"
                        bairro: Centro
                        codigo_municipio: "4209102"
                        municipio: Joinville
                        uf: SC
                        cep: "89217002"
                    tomador:
                      cpf_cnpj: "12345678909"
                      razao_social: Consumidor Final
                      tipo_pessoa: fisica
                    itens:
                      - codigo: SKU-001
                        descricao: Produto Teste
                        quantidade: 1
                        valor_unitario: 50
                        valor_total: 50
                        unidade: UN
                        ncm: "21069090"
                        cfop: "5102"
                    pagamento:
                      meios:
                        - meio: pix
                          valor: 50
                    totais:
                      valor_produtos: 50
                      valor_documento: 50
              nfse:
                summary: NFSe direta em fila
                value:
                  external_id: erp-nfse-3001
                  tipo_documento: nfse
                  municipio: "1302603"
                  ambiente_fiscal: homologacao
                  modo_emissao: fila
                  payload:
                    identificacao:
                      serie: "1"
                      numero: "3001"
                      natureza_operacao: Prestacao de servico
                      data_emissao: "2026-06-20T10:00:00-03:00"
                      data_competencia: "2026-06-20"
                      ambiente: homologacao
                      municipio_ocorrencia_codigo: "1302603"
                    emitente:
                      cpf_cnpj: "12345678000199"
                      razao_social: Empresa Teste LTDA
                      inscricao_municipal: "12345"
                      endereco:
                        logradouro: Rua Central
                        numero: "100"
                        bairro: Centro
                        codigo_municipio: "1302603"
                        municipio: Manaus
                        uf: AM
                        cep: "69000000"
                    tomador:
                      cpf_cnpj: "33440118000147"
                      razao_social: Tomador Servicos LTDA
                      tipo_pessoa: juridica
                      email: fiscal@tomador.test
                      endereco:
                        logradouro: Avenida Brasil
                        numero: "100"
                        bairro: Centro
                        codigo_municipio: "1302603"
                        municipio: Manaus
                        uf: AM
                        cep: "69000000"
                    itens:
                      - codigo: SERV-001
                        descricao: Servico de suporte tecnico
                        quantidade: 1
                        valor_unitario: 200
                        valor_total: 200
                        unidade: UN
                    servico:
                      codigo_servico_nacional: "140101"
                      codigo_servico_municipal: "0107"
                      codigo_nbs: "120018900"
                      codigo_municipio_prestacao: "1302603"
                      descricao: Servico de suporte tecnico
                    tributacao:
                      municipal:
                        tributacao_iss: "1"
                        tipo_retencao_iss: "1"
                        aliquota_iss: 5
                        enviar_aliquota_iss: true
                    totais:
                      valor_servicos: 200
                      valor_documento: 200
      responses:
        "200": { $ref: "#/components/responses/DirectDocumentAcceptedResponse" }
        "202": { $ref: "#/components/responses/DirectDocumentAcceptedResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfse/informacoes-provedor:
    get:
      tags: [Contratos]
      operationId: obterInformacoesProvedorNfseV2
      description: Retorna informacoes do provedor NFSe no contrato publico v2. fiscal_environment, provider_key, form_policy e camelCase sao rejeitados.
      x-required-scopes: ["configuration:read"]
      parameters:
        - name: municipio
          in: query
          required: false
          schema: { type: string, maxLength: 120 }
        - $ref: "#/components/parameters/AmbienteFiscal"
      responses:
        "200": { $ref: "#/components/responses/NfseProviderInfoResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfce/validar-csc:
    post:
      tags: [Contratos]
      operationId: validarCscNfceV2
      description: Valida CSC da NFCe usando campos publicos em portugues. fiscal_environment, environment, csc_id, csc_token e camelCase sao rejeitados.
      x-required-scopes: ["configuration:read"]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidarCscNfceRequestV2"
      responses:
        "200": { $ref: "#/components/responses/ValidarCscNfceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /configuracao:
    get:
      tags: [Configuracao]
      operationId: obterConfiguracaoEmpresaV2
      description: Retorna a configuracao da empresa vinculada ao token. Nao informe company_id na URL.
      x-required-scopes: ["configuration:read"]
      responses:
        "200": { $ref: "#/components/responses/CompanyConfigurationResponse" }
    put:
      tags: [Configuracao]
      operationId: atualizarConfiguracaoEmpresaV2
      description: Atualiza a configuracao usando somente campos publicos em portugues e snake_case. company_size, provider_key, csc_id e camelCase sao rejeitados.
      x-required-scopes: ["configuration:write"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AtualizarConfiguracaoEmpresaV2"
      responses:
        "200": { $ref: "#/components/responses/CompanyConfigurationResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /empresa:
    get:
      tags: [Empresa]
      operationId: obterEmpresaVinculadaV2
      description: Retorna a empresa vinculada 1:1 ao token de integracao. empresa_id, company_id e camelCase sao rejeitados.
      x-required-scopes: ["company:read"]
      responses:
        "200": { $ref: "#/components/responses/CompanyConfigurationResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /certificados:
    get:
      tags: [Certificados]
      operationId: listarCertificadosV2
      description: Lista certificados da empresa vinculada ao token.
      x-required-scopes: ["certificates:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    post:
      tags: [Certificados]
      operationId: criarCertificadoV2
      description: Cria certificado usando nome, nome_arquivo, arquivo_base64 e senha. name, file_name, file_base64 e camelCase sao rejeitados.
      x-required-scopes: ["certificates:write"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificadoRequestV2"
      responses:
        "201": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /certificados/{certificado}:
    patch:
      tags: [Certificados]
      operationId: atualizarCertificadoV2
      description: Atualiza metadados do certificado da empresa vinculada ao token.
      x-required-scopes: ["certificates:write"]
      parameters:
        - name: certificado
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AtualizarCertificadoRequestV2"
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /certificados/{certificado}/validar:
    post:
      tags: [Certificados]
      operationId: validarCertificadoV2
      description: Valida o certificado da empresa vinculada ao token.
      x-required-scopes: ["certificates:write"]
      parameters:
        - name: certificado
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /certificado-origem:
    get:
      tags: [Certificados]
      operationId: obterCertificadoOrigemV2
      x-required-scopes: ["certificates:read"]
      responses:
        "200": { $ref: "#/components/responses/CertificadoOrigemResponse" }
    put:
      tags: [Certificados]
      operationId: definirCertificadoOrigemV2
      description: Vincula uma empresa autorizada da mesma conta e raiz de CNPJ como origem do certificado.
      x-required-scopes: ["certificates:write"]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CertificadoOrigemRequestV2" }
      responses:
        "200": { $ref: "#/components/responses/CertificadoOrigemResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    delete:
      tags: [Certificados]
      operationId: removerCertificadoOrigemV2
      description: Remove o vínculo explícito e retorna a empresa ao modo de certificado próprio.
      x-required-scopes: ["certificates:write"]
      responses:
        "200": { $ref: "#/components/responses/CertificadoOrigemResponse" }
  /prontidao:
    get:
      tags: [Implantacao]
      operationId: obterProntidaoV2
      description: Retorna prontidao operacional da empresa vinculada ao token.
      x-required-scopes: ["onboarding:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes:
    get:
      tags: [Implantacao]
      operationId: listarImportacoesImplantacaoV2
      description: Lista importacoes de implantacao da empresa vinculada ao token.
      x-required-scopes: ["onboarding:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
    post:
      tags: [Implantacao]
      operationId: criarImportacaoImplantacaoV2
      description: Cria importacao de implantacao usando campos publicos em portugues.
      x-required-scopes: ["onboarding:write"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportacaoImplantacaoRequestV2"
      responses:
        "201": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes/{importacao}:
    get:
      tags: [Implantacao]
      operationId: obterImportacaoImplantacaoV2
      description: Retorna importacao de implantacao da empresa vinculada ao token.
      x-required-scopes: ["onboarding:read"]
      parameters:
        - name: importacao
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes/{importacao}/revisar:
    post:
      tags: [Implantacao]
      operationId: revisarImportacaoImplantacaoV2
      description: Aplica revisao em importacao de implantacao usando campos publicos em portugues.
      x-required-scopes: ["onboarding:write"]
      parameters:
        - name: importacao
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisarImportacaoImplantacaoRequestV2"
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes/{importacao}/promover:
    post:
      tags: [Implantacao]
      operationId: promoverImportacaoImplantacaoV2
      description: Promove importacao revisada para cadastros operacionais da empresa vinculada ao token.
      x-required-scopes: ["onboarding:write"]
      parameters:
        - name: importacao
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoverImportacaoImplantacaoRequestV2"
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/opcoes:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarOpcoesFiscaisV2
      description: Lista opcoes fiscais no vocabulario publico v2.
      x-required-scopes: ["fiscal_catalog:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
  /fiscal/cfops:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarCfopsV2
      description: Lista CFOPs usando codigo, descricao e demais campos publicos em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
  /fiscal/utilitarios/municipios:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarMunicipiosV2
      description: Pesquisa municipios por codigo ou termo em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: uf
          in: query
          schema: { type: string, minLength: 2, maxLength: 2 }
        - name: busca
          in: query
          schema: { type: string, maxLength: 120 }
        - name: limite
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/utilitarios/ncms:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarNcmsV2
      description: Pesquisa NCMs por codigo ou termo em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: busca
          in: query
          required: true
          schema: { type: string, maxLength: 120 }
        - name: limite
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/utilitarios/ibpt:
    post:
      tags: [Catalogos Fiscais]
      operationId: consultarIbptItemV2
      description: Consulta aliquotas IBPT por UF/NCM/EX e calcula tributos aproximados de um item usando somente campos publicos em portugues e snake_case.
      x-required-scopes: ["fiscal_catalog:read"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IbptItemRequestV2"
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/utilitarios/ibpt/cupom:
    post:
      tags: [Catalogos Fiscais]
      operationId: consultarIbptCupomV2
      description: Consulta aliquotas IBPT para os itens enviados e retorna totais aproximados do cupom.
      x-required-scopes: ["fiscal_catalog:read"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IbptCupomRequestV2"
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/catalogos-tributarios:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarCatalogosTributariosV2
      description: Lista catalogos tributarios aplicaveis a empresa vinculada ao token.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: familia_tributaria
          in: query
          schema: { type: string, maxLength: 80 }
        - name: ativo
          in: query
          schema: { type: boolean, default: true }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/catalogos-tributarios/{catalogo}/situacoes:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarSituacoesTributariasV2
      description: Lista situacoes tributarias de um catalogo.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: catalogo
          in: path
          required: true
          schema: { type: string }
        - name: codigo
          in: query
          schema: { type: string, maxLength: 80 }
        - name: tipo_codigo
          in: query
          schema: { type: string, maxLength: 80 }
        - name: ativo
          in: query
          schema: { type: boolean, default: true }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/situacoes-tributarias/{situacao}/classificacoes:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarClassificacoesTributariasV2
      description: Lista classificacoes tributarias de uma situacao.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: situacao
          in: path
          required: true
          schema: { type: string }
        - name: tributo
          in: query
          schema: { type: string, maxLength: 40 }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/situacoes-tributarias/{situacao}/modelo-consequencia:
    get:
      tags: [Catalogos Fiscais]
      operationId: gerarModeloConsequenciaTributariaV2
      description: Gera modelo de consequencia tributaria usando codigo_classificacao e campos publicos em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: situacao
          in: path
          required: true
          schema: { type: string }
        - name: tributo
          in: query
          schema: { type: string, maxLength: 40, default: ibs }
        - name: codigo_classificacao
          in: query
          schema: { type: string, maxLength: 80 }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /direto/documentos/xml:
    post:
      tags: [Documents]
      operationId: criarDocumentoDiretoXmlV2
      description: Enfileira XML fiscal em base64 usando tipo_documento e ambiente_fiscal. document_type, fiscal_environment e camelCase sao rejeitados.
      x-required-scopes: ["documents:direct"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectXmlDocumentRequestV2"
      responses:
        "202": { $ref: "#/components/responses/DirectDocumentAcceptedResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /consulta-notas:
    get:
      tags: [Documents]
      operationId: listarConsultaNotasV2
      description: Lista documentos por origem usando a empresa vinculada ao token.
      x-required-scopes: ["documents:read"]
      parameters:
        - name: busca
          in: query
          schema: { type: string, maxLength: 255 }
        - name: chave
          in: query
          schema: { type: string, maxLength: 60 }
        - name: chave_documento
          in: query
          schema: { type: string, maxLength: 60 }
        - name: direcao
          in: query
          schema: { type: string, enum: [entrada, saida] }
        - name: tipo_documento
          in: query
