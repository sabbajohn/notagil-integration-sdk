openapi: 3.1.0
info:
  title: Fiscal Platform API - Integracoes v2
  version: "2.0.0"
  description: Superficie estrita para emissao direta com payload fiscal publico em portugues e snake_case. A empresa e resolvida pelo token de integracao.
servers:
  - url: /api/v2/integrations
security:
  - bearerAuth: []
paths:
  /contratos/{tipo_documento}:
    get:
      tags: [Contratos]
      operationId: obterContratoFiscalV2
      description: Retorna discovery do contrato FiscalCanonicalPayloadV2 por tipo de documento. Todos os campos retornados usam portugues e snake_case.
      x-required-scopes: ["configuration:read", "documents:direct"]
      parameters:
        - $ref: "#/components/parameters/TipoDocumento"
      responses:
        "200": { $ref: "#/components/responses/ContractInfoResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /direto/documentos:
    post:
      tags: [Documents]
      operationId: criarDocumentoDiretoV2
      description: Requer Idempotency-Key. Enfileira uma emissao direta usando FiscalCanonicalPayloadV2 estrito. O payload aceita somente campos publicos em portugues, snake_case, sem aliases legados e sem nomes de XML ou provider.
      x-required-scopes: ["documents:direct"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectDocumentRequestV2"
      responses:
        "200": { $ref: "#/components/responses/DirectDocumentAcceptedResponse" }
        "202": { $ref: "#/components/responses/DirectDocumentAcceptedResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /contracts/{document_type}:
    get:
      tags: [Contratos]
      operationId: getFiscalContractV2
      deprecated: true
      description: Alias compatível de /contratos/{tipo_documento}. A resposta ja usa campos em portugues.
      x-required-scopes: ["configuration:read", "documents:direct"]
      parameters:
        - $ref: "#/components/parameters/DocumentType"
      responses:
        "200": { $ref: "#/components/responses/ContractInfoResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfse/informacoes-provedor:
    get:
      tags: [Contratos]
      operationId: obterInformacoesProvedorNfseV2
      description: Retorna informacoes do provedor NFSe no contrato publico v2. fiscal_environment, provider_key, form_policy e camelCase sao rejeitados.
      x-required-scopes: ["configuration:read"]
      parameters:
        - name: municipio
          in: query
          required: false
          schema: { type: string, maxLength: 120 }
        - $ref: "#/components/parameters/AmbienteFiscal"
      responses:
        "200": { $ref: "#/components/responses/NfseProviderInfoResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfce/validar-csc:
    post:
      tags: [Contratos]
      operationId: validarCscNfceV2
      description: Valida CSC da NFCe usando campos publicos em portugues. fiscal_environment, environment, csc_id, csc_token e camelCase sao rejeitados.
      x-required-scopes: ["configuration:read"]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidarCscNfceRequestV2"
      responses:
        "200": { $ref: "#/components/responses/ValidarCscNfceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /configuracao:
    get:
      tags: [Configuracao]
      operationId: obterConfiguracaoEmpresaV2
      description: Retorna a configuracao da empresa vinculada ao token. Nao informe company_id na URL.
      x-required-scopes: ["configuration:read"]
      responses:
        "200": { $ref: "#/components/responses/CompanyConfigurationResponse" }
    put:
      tags: [Configuracao]
      operationId: atualizarConfiguracaoEmpresaV2
      description: Atualiza a configuracao usando somente campos publicos em portugues e snake_case. company_size, provider_key, csc_id e camelCase sao rejeitados.
      x-required-scopes: ["configuration:write"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AtualizarConfiguracaoEmpresaV2"
      responses:
        "200": { $ref: "#/components/responses/CompanyConfigurationResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /empresa:
    get:
      tags: [Empresa]
      operationId: obterEmpresaVinculadaV2
      description: Retorna a empresa vinculada 1:1 ao token de integracao. empresa_id, company_id e camelCase sao rejeitados.
      x-required-scopes: ["company:read"]
      responses:
        "200": { $ref: "#/components/responses/CompanyConfigurationResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /certificados:
    get:
      tags: [Certificados]
      operationId: listarCertificadosV2
      description: Lista certificados da empresa vinculada ao token.
      x-required-scopes: ["certificates:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    post:
      tags: [Certificados]
      operationId: criarCertificadoV2
      description: Cria certificado usando nome, nome_arquivo, arquivo_base64 e senha. name, file_name, file_base64 e camelCase sao rejeitados.
      x-required-scopes: ["certificates:write"]
      responses:
        "201": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /certificados/{certificado}:
    patch:
      tags: [Certificados]
      operationId: atualizarCertificadoV2
      description: Atualiza metadados do certificado da empresa vinculada ao token.
      x-required-scopes: ["certificates:write"]
      parameters:
        - name: certificado
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /certificados/{certificado}/validar:
    post:
      tags: [Certificados]
      operationId: validarCertificadoV2
      description: Valida o certificado da empresa vinculada ao token.
      x-required-scopes: ["certificates:write"]
      parameters:
        - name: certificado
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /prontidao:
    get:
      tags: [Implantacao]
      operationId: obterProntidaoV2
      description: Retorna prontidao operacional da empresa vinculada ao token.
      x-required-scopes: ["onboarding:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes:
    get:
      tags: [Implantacao]
      operationId: listarImportacoesImplantacaoV2
      description: Lista importacoes de implantacao da empresa vinculada ao token.
      x-required-scopes: ["onboarding:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
    post:
      tags: [Implantacao]
      operationId: criarImportacaoImplantacaoV2
      description: Cria importacao de implantacao usando campos publicos em portugues.
      x-required-scopes: ["onboarding:write"]
      responses:
        "202": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes/{importacao}:
    get:
      tags: [Implantacao]
      operationId: obterImportacaoImplantacaoV2
      description: Retorna importacao de implantacao da empresa vinculada ao token.
      x-required-scopes: ["onboarding:read"]
      parameters:
        - name: importacao
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes/{importacao}/revisar:
    post:
      tags: [Implantacao]
      operationId: revisarImportacaoImplantacaoV2
      description: Aplica revisao em importacao de implantacao usando campos publicos em portugues.
      x-required-scopes: ["onboarding:write"]
      parameters:
        - name: importacao
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /implantacao/importacoes/{importacao}/promover:
    post:
      tags: [Implantacao]
      operationId: promoverImportacaoImplantacaoV2
      description: Promove importacao revisada para cadastros operacionais da empresa vinculada ao token.
      x-required-scopes: ["onboarding:write"]
      parameters:
        - name: importacao
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/opcoes:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarOpcoesFiscaisV2
      description: Lista opcoes fiscais no vocabulario publico v2.
      x-required-scopes: ["fiscal_catalog:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
  /fiscal/cfops:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarCfopsV2
      description: Lista CFOPs usando codigo, descricao e demais campos publicos em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
  /fiscal/utilitarios/municipios:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarMunicipiosV2
      description: Pesquisa municipios por codigo ou termo em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
  /fiscal/utilitarios/ncms:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarNcmsV2
      description: Pesquisa NCMs por codigo ou termo em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
  /fiscal/utilitarios/ibpt:
    post:
      tags: [Catalogos Fiscais]
      operationId: consultarIbptItemV2
      description: Consulta aliquotas IBPT por UF/NCM/EX e calcula tributos aproximados de um item usando somente campos publicos em portugues e snake_case.
      x-required-scopes: ["fiscal_catalog:read"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/utilitarios/ibpt/cupom:
    post:
      tags: [Catalogos Fiscais]
      operationId: consultarIbptCupomV2
      description: Consulta aliquotas IBPT para os itens enviados e retorna totais aproximados do cupom.
      x-required-scopes: ["fiscal_catalog:read"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/catalogos-tributarios:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarCatalogosTributariosV2
      description: Lista catalogos tributarios aplicaveis a empresa vinculada ao token.
      x-required-scopes: ["fiscal_catalog:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
  /fiscal/catalogos-tributarios/{catalogo}/situacoes:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarSituacoesTributariasV2
      description: Lista situacoes tributarias de um catalogo.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: catalogo
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/situacoes-tributarias/{situacao}/classificacoes:
    get:
      tags: [Catalogos Fiscais]
      operationId: listarClassificacoesTributariasV2
      description: Lista classificacoes tributarias de uma situacao.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: situacao
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /fiscal/situacoes-tributarias/{situacao}/modelo-consequencia:
    post:
      tags: [Catalogos Fiscais]
      operationId: gerarModeloConsequenciaTributariaV2
      description: Gera modelo de consequencia tributaria usando codigo_classificacao e campos publicos em portugues.
      x-required-scopes: ["fiscal_catalog:read"]
      parameters:
        - name: situacao
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /direto/documentos/xml:
    post:
      tags: [Documents]
      operationId: criarDocumentoDiretoXmlV2
      description: Enfileira XML fiscal em base64 usando tipo_documento e ambiente_fiscal. document_type, fiscal_environment e camelCase sao rejeitados.
      x-required-scopes: ["documents:direct"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202": { $ref: "#/components/responses/DirectDocumentAcceptedResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /consulta-notas:
    get:
      tags: [Documents]
      operationId: listarConsultaNotasV2
      description: Lista documentos por origem usando a empresa vinculada ao token.
      x-required-scopes: ["documents:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /consulta-notas/consultar:
    post:
      tags: [Documents]
      operationId: consultarNotasV2
      description: Consulta documento fiscal por origem e identificador usando campos publicos em portugues.
      x-required-scopes: ["documents:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /consulta-notas/{origem}/{documento}/xml:
    get:
      tags: [Documents]
      operationId: baixarXmlConsultaNotasV2
      description: Baixa XML de documento consultado sem parametro de empresa.
      x-required-scopes: ["documents:read"]
      parameters:
        - name: origem
          in: path
          required: true
          schema: { type: string }
        - name: documento
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: XML do documento fiscal. }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /consulta-notas/{origem}/{documento}/pdf:
    get:
      tags: [Documents]
      operationId: baixarPdfConsultaNotasV2
      description: Baixa PDF de documento consultado sem parametro de empresa.
      x-required-scopes: ["documents:read"]
      parameters:
        - name: origem
          in: path
          required: true
          schema: { type: string }
        - name: documento
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: PDF do documento fiscal. }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /nfe/entrada:
    get:
      tags: [NFe Entrada]
      operationId: listarNfeEntradaV2
      description: Lista NFes de entrada da empresa vinculada ao token.
      x-required-scopes: ["documents:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
  /nfe/entrada/sincronizar:
    post:
      tags: [NFe Entrada]
      operationId: sincronizarNfeEntradaV2
      description: Solicita sincronizacao de NFes de entrada usando ambiente_fiscal opcional.
      x-required-scopes: ["documents:read"]
      responses:
        "202": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfe/entrada/{documento}/manifestar:
    post:
      tags: [NFe Entrada]
      operationId: manifestarNfeEntradaV2
      description: Manifesta NFe de entrada usando acao_manifestacao em portugues.
      x-required-scopes: ["documents:write"]
      parameters:
        - name: documento
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfe/entrada/{documento}/baixar-xml:
    post:
      tags: [NFe Entrada]
      operationId: baixarXmlNfeEntradaV2
      description: Solicita download do XML de NFe de entrada.
      x-required-scopes: ["documents:write"]
      parameters:
        - name: documento
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfe/entrada/{documento}/escrituracao:
    post:
      tags: [NFe Entrada]
      operationId: escriturarNfeEntradaV2
      description: Gera escrituracao da NFe de entrada usando campos publicos em portugues.
      x-required-scopes: ["documents:write"]
      parameters:
        - name: documento
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /nfe/entrada/{documento}/escrituracao/confirmar:
    post:
      tags: [NFe Entrada]
      operationId: confirmarEscrituracaoNfeEntradaV2
      description: Confirma escrituracao de NFe de entrada.
      x-required-scopes: ["documents:write"]
      parameters:
        - name: documento
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /produtos:
    get:
      tags: [Produtos]
      operationId: listarProdutosV2
      description: Lista produtos da empresa vinculada ao token.
      x-required-scopes: ["products:read"]
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    post:
      tags: [Produtos]
      operationId: criarProdutoV2
      description: Cria produto com campos publicos em portugues. origin_code e camelCase sao rejeitados.
      x-required-scopes: ["products:write"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      responses:
        "201": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /produtos/catalogo/{recurso}:
    get:
      tags: [Produtos]
      operationId: listarCatalogoProdutoAuxiliarV2
      description: "Lista recursos auxiliares do catalogo de produtos. Recursos: unidades-medida, conversoes-unidade, classificacoes-mercadologicas, produtos-mestre, familias, categorias-pdv, codigos-barras, apresentacoes, precos, fornecedores, produto-fornecedores, locais-estoque, enderecos-estoque, lotes, saldos-estoque."
      x-required-scopes: ["products:read"]
      parameters:
        - name: recurso
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/GenericCollectionResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    post:
      tags: [Produtos]
      operationId: criarCatalogoProdutoAuxiliarV2
      description: Cria recurso auxiliar do catalogo de produtos com campos publicos em portugues e snake_case.
      x-required-scopes: ["products:write"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      parameters:
        - name: recurso
          in: path
          required: true
          schema: { type: string }
      responses:
        "201": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
  /produtos/catalogo/{recurso}/{id}:
    get:
      tags: [Produtos]
      operationId: obterCatalogoProdutoAuxiliarV2
      description: Retorna recurso auxiliar do catalogo de produtos.
      x-required-scopes: ["products:read"]
      parameters:
        - name: recurso
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
    put:
      tags: [Produtos]
      operationId: atualizarCatalogoProdutoAuxiliarV2
      description: Atualiza recurso auxiliar do catalogo de produtos.
      x-required-scopes: ["products:write"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      parameters:
        - name: recurso
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    delete:
      tags: [Produtos]
      operationId: excluirCatalogoProdutoAuxiliarV2
      description: Exclui recurso auxiliar do catalogo de produtos.
      x-required-scopes: ["products:delete"]
      parameters:
        - name: recurso
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/DeleteResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /produtos/{produto}:
    get:
      tags: [Produtos]
      operationId: obterProdutoV2
      description: Retorna produto da empresa vinculada ao token.
      x-required-scopes: ["products:read"]
      parameters:
        - name: produto
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "404": { $ref: "#/components/responses/ErrorResponse" }
    put:
      tags: [Produtos]
      operationId: atualizarProdutoV2
      description: Atualiza produto usando campos publicos em portugues.
      x-required-scopes: ["products:write"]
      requestBody: { $ref: "#/components/requestBodies/JsonObject" }
      parameters:
        - name: produto
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/GenericResourceResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    delete:
      tags: [Produtos]
      operationId: excluirProdutoV2
      description: Exclui produto da empresa vinculada ao token.
      x-required-scopes: ["products:delete"]
      parameters:
        - name: produto
          in: path
          required: true
          schema: { type: integer }
      responses:
